<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SkillEarn Transactions</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-slate-100 pb-24">

<div id="screen"></div>



<script>

const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);



if(!token){

    window.location=
    "login.html";

}




loadTransactions();




function loader(){

    screen.innerHTML=`

        <div class="
            min-h-screen
            flex
            justify-center
            items-center
        ">

            <div class="
                w-12
                h-12
                border-4
                border-blue-600
                border-t-transparent
                rounded-full
                animate-spin
            "></div>

        </div>

    `;

}




async function loadTransactions(){

    loader();



    try{

        const res =
        await fetch(
            API+
            "/api/users/transactions",
            {

                headers:{
                    Authorization:
                    "Bearer "+token
                }

            }
        );



        const tx =
        await res.json();




        if(
            !tx.length
        ){

            screen.innerHTML=`

                <div class="
                    min-h-screen
                    flex
                    justify-center
                    items-center
                    text-center
                    p-6
                ">

                    <div>

                        <h2 class="
                            text-2xl
                            font-bold
                            mb-2
                        ">
                            No transactions
                        </h2>


                        <p class="
                            text-slate-500
                        ">
                            Earnings and withdrawals will appear here
                        </p>

                    </div>

                </div>

            `;


            return;

        }




        screen.innerHTML=`

            <div class="
                max-w-5xl
                mx-auto
                p-4
            ">

                <h1 class="
                    text-2xl
                    font-bold
                    mb-5
                ">
                    Transactions
                </h1>



                ${
                    tx.map(
                        item=>`

                        <div class="
                            bg-white
                            rounded-3xl
                            p-5
                            shadow
                            mb-4
                        ">

                            <div class="
                                flex
                                justify-between
                                mb-3
                            ">

                                <h2 class="
                                    font-bold
                                ">
                                    ${item.type}
                                </h2>



                                <h2 class="
                                    font-bold
                                    text-blue-600
                                ">
                                    ${item.amount}
                                </h2>

                            </div>




                            <p class="
                                text-slate-500
                                text-sm
                                mb-2
                            ">

                                Ref:
                                ${
                                    item.reference
                                    || "-"
                                }

                            </p>




                            <p class="
                                text-slate-400
                                text-sm
                            ">

                                ${
                                    item.created_at
                                    || ""
                                }

                            </p>

                        </div>

                        `
                    ).join("")
                }

            </div>

        `;



    }catch(err){

        alert(
            "Network error"
        );

    }

}


</script>

</body>
</html>
