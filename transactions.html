<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Transactions</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.card{
    animation:fade .3s;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>

</head>

<body class="bg-slate-100">

<div id="app"></div>


<div
    id="loader"

    class="
        fixed
        inset-0
        flex
        items-center
        justify-center
        bg-black/10
        z-50
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(
    localStorage.getItem(
        "user"
    )
);



if(
    !token ||
    !user
){

    location =
    "login.html";

}



load();




function symbol(){

    if(
        user.country==="NG"
    ){

        return "₦";

    }


    return "$";

}






async function load(){

    try{

        const res =
        await fetch(

            API+
            "/api/users/transactions",

            {

                headers:{

                    Authorization:
                    "Bearer "+
                    token

                }

            }

        );



        const list =
        await res.json();



        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render(
            list
        );



    }catch(error){

        location =
        "login.html";

    }

}






function render(
    list
){

    let html =
    "";



    if(
        !list.length
    ){

        html = `

            <div class="
                bg-white
                rounded-[28px]
                p-8
                text-center
                shadow
            ">

                <div class="
                    text-5xl
                    mb-3
                ">
                    💳
                </div>



                <p class="
                    text-slate-500
                ">
                    No transactions yet
                </p>

            </div>

        `;

    }

    else{

        html =

        list.map(

            item=>row(
                item
            )

        ).join(
            ""
        );

    }



    document
    .getElementById(
        "app"
    )
    .innerHTML = `

        <div class="
            p-4
            pb-28
        ">



            <h1 class="
                text-2xl
                font-bold
                mb-5
            ">
                Transactions
            </h1>



            ${html}


        </div>




        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav(
                "🏠",
                "dashboard.html"
            )}

            ${nav(
                "💰",
                "jobs.html"
            )}

            ${nav(
                "🔔",
                "notifications.html"
            )}

            ${nav(
                "👤",
                "profile.html"
            )}

        </div>

    `;

}






function row(
    item
){

    const isWithdraw =

    item.type ===
    "withdrawal";



    const icon =

    isWithdraw
    ?

    "↗"

    :

    "↙";



    return `

        <div class="
            card
            bg-white
            rounded-[24px]
            p-4
            shadow
            mb-4
            flex
            justify-between
            items-center
        ">




            <div class="
                flex
                gap-3
                items-center
            ">

                <div class="
                    text-2xl
                ">
                    ${icon}
                </div>



                <div>

                    <p class="
                        font-semibold
                    ">

                        ${formatType(
                            item.type
                        )}

                    </p>



                    <p class="
                        text-xs
                        text-slate-500
                    ">

                        ${item.reference || "-"}

                    </p>



                    <p class="
                        text-xs
                        text-slate-500
                    ">

                        ${date(
                            item.created_at
                        )}

                    </p>

                </div>

            </div>




            <div class="
                font-bold
                text-blue-600
            ">

                ${symbol()}
                ${Number(
                    item.amount || 0
                ).toLocaleString()}

            </div>

        </div>

    `;

}






function formatType(
    type
){

    if(
        type==="earning"
    ){

        return
        "Task Earning";

    }



    if(
        type==="withdrawal"
    ){

        return
        "Withdrawal";

    }



    return type;

}






function date(
    value
){

    if(
        !value
    ){

        return
        "Today";

    }



    return
    new Date(
        value
    )
    .toLocaleString();

}






function nav(
    icon,
    page
){

    return `

        <a

            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    `;

}

</script>

</body>
    </html>
