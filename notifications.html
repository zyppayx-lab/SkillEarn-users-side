<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notifications • SkillEarn</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 pb-24">

<div id="app"></div>

<script>

const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const app =
document.getElementById(
    "app"
);




load();




async function load(){

    const res =
    await fetch(
        API+
        "/api/users/notifications",
        {

            headers:{
                Authorization:
                "Bearer "+token
            }

        }
    );



    const rows =
    await res.json();



    let html = "";



    rows.forEach(
        row=>{

            html += `

                <div class="
                    bg-white
                    rounded-3xl
                    p-5
                    shadow
                    mb-4
                ">

                    ${row.message}

                </div>

            `;

        }
    );



    app.innerHTML=`

        <div class="
            p-4
        ">

            ${html}

        </div>

    `;

}

</script>

</body>
</html>
