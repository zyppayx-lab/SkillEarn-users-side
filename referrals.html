<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Referrals • SkillEarn</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-slate-100 pb-24">

<div id="app"></div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const app =
document.getElementById(
    "app"
);



if(!token){

    window.location=
    "login.html";

}




load();




function loader(){

    app.innerHTML=`

        <div class="
            min-h-screen
            flex
            justify-center
            items-center
        ">

            <div class="
                w-12
                h-12
                border-4
                border-blue-600
                border-t-transparent
                rounded-full
                animate-spin
            "></div>

        </div>

    `;

}




async function load(){

    loader();



    try{

        const walletRes =
        await fetch(
            API+
            "/api/users/wallet",
            {

                headers:{
                    Authorization:
                    "Bearer "+token
                }

            }
        );



        const wallet =
        await walletRes.json();




        const refsRes =
        await fetch(
            API+
            "/api/users/referrals",
            {

                headers:{
                    Authorization:
                    "Bearer "+token
                }

            }
        );



        const referrals =
        await refsRes.json();




        render(
            wallet,
            referrals
        );



    }catch(error){

        console.error(
            error
        );



        alert(
            "Failed to load"
        );

    }

}




function render(
    wallet,
    referrals
){

    let total = 0;


    let rows = "";



    referrals.forEach(
        row=>{

            total +=
            Number(
                row.amount
            );



            rows += `

                <div class="
                    bg-white
                    rounded-3xl
                    p-5
                    shadow
                    mb-4
                ">

                    <p class="
                        font-bold
                        mb-1
                    ">
                        ${row.name}
                    </p>



                    <p class="
                        text-blue-600
                        font-bold
                        mb-1
                    ">
                        +
                        ${row.amount}
                        ${row.currency}
                    </p>



                    <p class="
                        text-slate-500
                    ">
                        ${row.status}
                    </p>

                </div>

            `;

        }
    );



    app.innerHTML=`

        <div class="
            p-4
            max-w-4xl
            mx-auto
        ">



            <div class="
                bg-blue-600
                text-white
                rounded-3xl
                p-6
                mb-5
                text-center
            ">

                <p>
                    Referral Code
                </p>



                <h2 class="
                    text-2xl
                    font-bold
                    mt-2
                    mb-4
                ">
                    ${wallet.referral_code}
                </h2>




                <button
                    id="copyBtn"

                    class="
                        bg-white
                        text-blue-600
                        px-6
                        py-3
                        rounded-xl
                        font-bold
                    "
                >

                    Copy Code

                </button>

            </div>




            <div class="
                bg-white
                rounded-3xl
                p-5
                shadow
                mb-5
            ">

                <p class="
                    text-slate-500
                ">
                    Total Referral Earnings
                </p>



                <h2 class="
                    text-3xl
                    font-bold
                    text-blue-600
                    mt-2
                ">
                    ${total}
                </h2>

            </div>




            ${rows ||

            `

            <div class="
                text-center
                text-slate-500
                mt-12
            ">

                No referrals yet

            </div>

            `}

        </div>

    `;




    document
    .getElementById(
        "copyBtn"
    )
    .addEventListener(
        "click",
        copyCode
    );

}




async function copyCode(){

    const walletRes =
    await fetch(
        API+
        "/api/users/wallet",
        {

            headers:{
                Authorization:
                "Bearer "+token
            }

        }
    );



    const wallet =
    await walletRes.json();



    await navigator
    .clipboard
    .writeText(
        wallet.referral_code
    );



    alert(
        "Referral code copied"
    );

}

</script>

</body>
</html>
