<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Referrals</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.fade{
    animation:fade .3s;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>



<div
    id="loader"

    class="
        fixed
        inset-0
        flex
        items-center
        justify-center
        bg-black/10
        z-50
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    )

);


if(
    !token ||
    !user
){

    location =
    "login.html";

}



load();




function symbol(){

    if(
        user.country==="NG"
    ){

        return "₦";

    }


    return "$";

}






function reward(){

    if(
        user.country==="NG"
    ){

        return "₦500";

    }


    return "$1";

}






async function load(){

    try{

        const walletRes =
        await fetch(

            API+
            "/api/users/wallet",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const wallet =
        await walletRes.json();




        const refRes =
        await fetch(

            API+
            "/api/users/referrals",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const list =
        await refRes.json();



        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render(
            wallet,
            list
        );



    }catch(error){

        location =
        "login.html";

    }

}






function render(
    wallet,
    list
){

    const total =

    list.reduce(

        (
            sum,
            item
        )=>

        sum+

        Number(
            item.amount || 0
        ),

        0

    );



    let history =
    "";



    if(
        !list.length
    ){

        history = `

            <div class="
                text-center
                py-10
            ">

                <div class="
                    text-5xl
                    mb-3
                ">
                    🎁
                </div>



                <p class="
                    text-slate-500
                ">
                    No referral earnings yet
                </p>

            </div>

        `;

    }

    else{

        history =

        list.map(

            item=>row(
                item
            )

        ).join(
            ""
        );

    }



    document
    .getElementById(
        "app"
    )
    .innerHTML = `

        <div class="
            p-4
            pb-28
        ">




            <!-- EARNINGS -->
            <div class="
                fade
                bg-blue-600
                text-white
                rounded-[28px]
                p-6
                text-center
                shadow-xl
                mb-5
            ">

                <p>
                    Total Referral Earnings
                </p>



                <h1 class="
                    text-3xl
                    font-bold
                    mt-2
                ">

                    ${symbol()}
                    ${total.toLocaleString()}

                </h1>




                <p class="
                    mt-3
                    text-sm
                ">

                    Earn ${reward()}
                    per referral

                </p>

            </div>




            <!-- CODE -->
            <div class="
                fade
                bg-white
                rounded-[28px]
                p-5
                shadow
                mb-5
            ">

                <p class="
                    text-slate-500
                    text-sm
                ">
                    Referral Code
                </p>



                <h2 class="
                    text-xl
                    font-bold
                    mt-2
                    mb-4
                ">

                    ${wallet.referral_code}

                </h2>




                <div class="
                    grid
                    grid-cols-2
                    gap-3
                ">

                    <button

                        onclick="
                            copyCode(
                                '${wallet.referral_code}'
                            )
                        "

                        class="
                            bg-blue-600
                            text-white
                            py-3
                            rounded-2xl
                        "
                    >

                        Copy

                    </button>




                    <button

                        onclick="
                            shareCode(
                                '${wallet.referral_code}'
                            )
                        "

                        class="
                            bg-slate-200
                            py-3
                            rounded-2xl
                        "
                    >

                        Share

                    </button>

                </div>

            </div>




            <!-- HISTORY -->
            <div class="
                fade
                bg-white
                rounded-[28px]
                p-5
                shadow
            ">

                <h3 class="
                    font-bold
                    mb-4
                ">
                    Referral History
                </h3>



                ${history}

            </div>




        </div>




        <!-- NAV -->
        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav(
                "🏠",
                "dashboard.html"
            )}

            ${nav(
                "💰",
                "jobs.html"
            )}

            ${nav(
                "🔔",
                "notifications.html"
            )}

            ${nav(
                "👤",
                "profile.html"
            )}

        </div>

    `;

}






function row(
    item
){

    return `

        <div class="
            border-b
            py-4
            flex
            justify-between
        ">




            <div>

                <p class="
                    font-semibold
                ">
                    ${item.name}
                </p>



                <p class="
                    text-xs
                    text-slate-500
                ">

                    ${date(
                        item.created_at
                    )}

                </p>

            </div>




            <div class="
                text-right
            ">

                <p class="
                    text-blue-600
                    font-bold
                ">

                    ${item.currency}
                    ${item.amount}

                </p>



                <p class="
                    text-xs
                    text-slate-500
                ">

                    ${item.status}

                </p>

            </div>

        </div>

    `;

}






function date(
    value
){

    if(
        !value
    ){

        return
        "Today";

    }



    return
    new Date(
        value
    )
    .toLocaleDateString();

}






function copyCode(
    code
){

    navigator
    .clipboard
    .writeText(
        code
    );



    alert(
        "Copied"
    );

}






async function shareCode(
    code
){

    const link =

    "https://skillearn.com?ref="+
    code;



    if(
        navigator.share
    ){

        await navigator.share({

            title:
            "Join SkillEarn",


            text:
            "Use my referral code",


            url:
            link

        });

    }

    else{

        copyCode(
            link
        );

    }

}






function nav(
    icon,
    page
){

    return `

        <a

            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    `;

}

</script>

</body>
    </html>
