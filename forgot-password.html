<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Forgot Password • SkillEarn</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div id="app"></div>


<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const app =
document.getElementById(
    "app"
);



if(!app){

    alert(
        "UI mount failed"
    );

}




start();




function start(){

    renderEmailForm();

}




function renderEmailForm(){

    app.innerHTML=`

        <div class="
            min-h-screen
            flex
            items-center
            justify-center
            p-4
        ">

            <div class="
                bg-white
                rounded-3xl
                shadow
                p-6
                w-full
                max-w-md
            ">

                <h1 class="
                    text-2xl
                    font-bold
                    text-center
                    mb-2
                ">
                    Forgot Password
                </h1>



                <p class="
                    text-slate-500
                    text-center
                    mb-6
                ">
                    Enter your email
                </p>




                <input
                    id="email"

                    type="email"

                    placeholder="Email"

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-5
                    "
                >




                <button
                    id="sendBtn"

                    class="
                        w-full
                        bg-blue-600
                        text-white
                        py-4
                        rounded-xl
                        font-bold
                    "
                >

                    Send OTP

                </button>

            </div>

        </div>

    `;



    document
    .getElementById(
        "sendBtn"
    )
    .addEventListener(
        "click",
        sendOTP
    );

}




async function sendOTP(){

    const emailInput =
    document.getElementById(
        "email"
    );



    const sendBtn =
    document.getElementById(
        "sendBtn"
    );



    const email =
    emailInput.value.trim();




    if(!email){

        alert(
            "Enter email"
        );

        return;

    }




    sendBtn.disabled =
    true;


    sendBtn.innerHTML =
    "Sending...";




    try{

        const res =
        await fetch(
            API+
            "/api/auth/forgot-password",
            {

                method:"POST",


                headers:{
                    "Content-Type":
                    "application/json"
                },


                body:
                JSON.stringify({

                    email:email

                })

            }
        );



        const data =
        await res.json();



        alert(
            data.message
        );



        if(
            data.message===
            "Reset OTP sent"
        ){

            renderResetForm(
                email
            );

            return;

        }



        sendBtn.disabled =
        false;


        sendBtn.innerHTML =
        "Send OTP";



    }catch(error){

        console.error(
            error
        );



        alert(
            "Network error"
        );



        sendBtn.disabled =
        false;


        sendBtn.innerHTML =
        "Send OTP";

    }

}




function renderResetForm(
    email
){

    app.innerHTML=`

        <div class="
            min-h-screen
            flex
            items-center
            justify-center
            p-4
        ">

            <div class="
                bg-white
                rounded-3xl
                shadow
                p-6
                w-full
                max-w-md
            ">

                <h1 class="
                    text-2xl
                    font-bold
                    text-center
                    mb-2
                ">
                    Reset Password
                </h1>



                <p class="
                    text-slate-500
                    text-center
                    mb-6
                ">
                    OTP sent to
                    ${email}
                </p>




                <input
                    id="otp"

                    placeholder="OTP"

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-4
                    "
                >




                <input
                    id="newPassword"

                    type="password"

                    placeholder="
                        New password
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-5
                    "
                >




                <button
                    id="resetBtn"

                    class="
                        w-full
                        bg-blue-600
                        text-white
                        py-4
                        rounded-xl
                        font-bold
                    "
                >

                    Reset Password

                </button>

            </div>

        </div>

    `;



    document
    .getElementById(
        "resetBtn"
    )
    .addEventListener(
        "click",
        ()=>resetPassword(
            email
        )
    );

}




async function resetPassword(
    email
){

    const otp =
    document
    .getElementById(
        "otp"
    )
    .value
    .trim();



    const password =
    document
    .getElementById(
        "newPassword"
    )
    .value;



    const resetBtn =
    document
    .getElementById(
        "resetBtn"
    );




    if(
        !otp ||
        !password
    ){

        alert(
            "Complete all fields"
        );

        return;

    }




    resetBtn.disabled =
    true;


    resetBtn.innerHTML =
    "Updating...";




    try{

        const res =
        await fetch(
            API+
            "/api/auth/reset-password",
            {

                method:"POST",


                headers:{
                    "Content-Type":
                    "application/json"
                },


                body:
                JSON.stringify({

                    email:email,

                    otp:otp,

                    new_password:
                    password

                })

            }
        );



        const data =
        await res.json();



        alert(
            data.message
        );



        if(
            data.message===
            "Password updated"
        ){

            window.location=
            "login.html";

            return;

        }



        resetBtn.disabled =
        false;


        resetBtn.innerHTML =
        "Reset Password";



    }catch(error){

        console.error(
            error
        );



        alert(
            "Network error"
        );



        resetBtn.disabled =
        false;


        resetBtn.innerHTML =
        "Reset Password";

    }

}

</script>

</body>
    </html>
