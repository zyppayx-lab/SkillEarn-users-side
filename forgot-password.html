<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SkillEarn Reset Password</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-slate-100 min-h-screen flex justify-center items-center px-4">

<div id="screen" class="w-full max-w-md"></div>



<script>

const API =
"https://skillearn.onrender.com";


renderEmail();




function renderEmail(){

    screen.innerHTML=`

        <div class="bg-white rounded-3xl shadow-xl p-8">

            <div class="text-center mb-8">

                <h1 class="text-3xl font-bold text-blue-600">
                    SkillEarn
                </h1>

                <p class="text-slate-500 mt-2">
                    Reset password
                </p>

            </div>



            <input
                id="email"
                type="email"
                placeholder="Email address"
                class="w-full border p-4 rounded-xl mb-6"
            >



            <button
                id="sendBtn"
                onclick="sendOTP()"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold"
            >
                Send OTP
            </button>

        </div>

    `;

}





async function sendOTP(){

    sendBtn.disabled=true;


    sendBtn.innerHTML=
    "Sending...";


    try{

        const res =
        await fetch(
            API+"/api/auth/forgot-password",
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    email:email.value

                })

            }
        );


        const data =
        await res.json();


        alert(
            data.message
        );


        renderReset(
            email.value
        );


    }catch(err){

        alert(
            "Network error"
        );

    }

}




function renderReset(userEmail){

    screen.innerHTML=`

        <div class="bg-white rounded-3xl shadow-xl p-8">

            <div class="text-center mb-8">

                <h1 class="text-2xl font-bold text-blue-600">
                    Enter OTP
                </h1>

            </div>



            <input
                id="otp"
                placeholder="OTP"
                class="w-full border p-4 rounded-xl mb-4"
            >



            <input
                id="newPassword"
                type="password"
                placeholder="New password"
                class="w-full border p-4 rounded-xl mb-6"
            >



            <button
                id="resetBtn"
                onclick="resetPassword('${userEmail}')"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold"
            >
                Reset Password
            </button>

        </div>

    `;

}




async function resetPassword(userEmail){

    resetBtn.disabled=true;


    resetBtn.innerHTML=
    "Updating...";


    try{

        const res =
        await fetch(
            API+"/api/auth/reset-password",
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    email:userEmail,

                    otp:otp.value,

                    new_password:newPassword.value

                })

            }
        );


        const data =
        await res.json();


        alert(
            data.message
        );



        if(
            data.message===
            "Password updated"
        ){

            window.location=
            "login.html";

        }


    }catch(err){

        alert(
            "Network error"
        );

    }



    resetBtn.disabled=false;


    resetBtn.innerHTML=
    "Reset Password";

}


</script>

</body>
</html>
