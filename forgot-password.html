<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SkillEarn • Forgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div id="screen"></div>

<script>
"use strict";

const API = "https://skillearn.onrender.com";

const state = {
    email: "",
    cooldown: 0,
    timer: null
};


init();



function init(){
    renderEmailForm();
}



function escapeHTML(str){
    return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}



function validEmail(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(
        email
    );
}



function validOTP(otp){
    return /^\d{6}$/.test(
        otp
    );
}



function passwordScore(password){

    let score = 0;

    if(password.length >= 8) score++;
    if(/[A-Z]/.test(password)) score++;
    if(/[a-z]/.test(password)) score++;
    if(/[0-9]/.test(password)) score++;
    if(/[^A-Za-z0-9]/.test(password)) score++;

    return score;
}



function validPassword(password){
    return passwordScore(password) >= 5;
}



function passwordLabel(score){

    if(score <= 2){
        return "Weak";
    }

    if(score <= 4){
        return "Medium";
    }

    return "Strong";
}



function renderEmailForm(){

    screen.innerHTML = `
        <div class="
            min-h-screen
            flex
            items-center
            justify-center
            p-4
        ">

            <div class="
                bg-white
                rounded-3xl
                shadow
                p-6
                w-full
                max-w-md
            ">

                <h1 class="
                    text-2xl
                    font-bold
                    text-center
                    mb-2
                ">
                    Forgot Password
                </h1>

                <p class="
                    text-slate-500
                    text-center
                    mb-6
                ">
                    Enter your account email
                </p>

                <input
                    id="emailInput"
                    type="email"
                    placeholder="Email address"
                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-5
                    "
                >

                <button
                    id="sendBtn"
                    class="
                        w-full
                        bg-blue-600
                        text-white
                        py-4
                        rounded-xl
                        font-bold
                    "
                >
                    Send OTP
                </button>

            </div>

        </div>
    `;

    document
        .getElementById(
            "sendBtn"
        )
        .addEventListener(
            "click",
            sendOTP
        );
}



async function sendOTP(){

    const emailInput =
    document.getElementById(
        "emailInput"
    );

    const sendBtn =
    document.getElementById(
        "sendBtn"
    );

    const email =
    emailInput.value
        .trim()
        .toLowerCase();

    if(
        !validEmail(email)
    ){
        alert(
            "Invalid email"
        );
        return;
    }

    sendBtn.disabled = true;
    sendBtn.textContent = "Sending...";

    try{

        const res =
        await fetch(
            API +
            "/api/auth/forgot-password",
            {

                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:
                JSON.stringify({
                    email
                })

            }
        );

        const data =
        await res.json();

        alert(
            data.message ||
            data.error ||
            "Failed"
        );

        if(
            res.ok
        ){

            state.email =
            email;

            renderResetForm();

            startCooldown();

        }

    }catch(err){

        alert(
            "Network error"
        );

    }finally{

        if(
            document.getElementById(
                "sendBtn"
            )
        ){
            sendBtn.disabled =
            false;

            sendBtn.textContent =
            "Send OTP";
        }

    }

}



function renderResetForm(){

    screen.innerHTML = `
        <div class="
            min-h-screen
            flex
            items-center
            justify-center
            p-4
        ">

            <div class="
                bg-white
                rounded-3xl
                shadow
                p-6
                w-full
                max-w-md
            ">

                <h1 class="
                    text-2xl
                    font-bold
                    text-center
                    mb-2
                ">
                    Reset Password
                </h1>

                <p class="
                    text-slate-500
                    text-center
                    mb-6
                ">
                    OTP sent to
                    <br>
                    ${escapeHTML(
                        state.email
                    )}
                </p>

                <input
                    id="otpInput"
                    placeholder="
                        6 digit OTP
                    "

                    maxlength="6"

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-4
                    "
                >

                <input
                    id="passwordInput"

                    type="password"

                    placeholder="
                        New password
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                    "
                >

                <p
                    id="strengthText"

                    class="
                        text-sm
                        mt-2
                        mb-5
                        text-slate-500
                    "
                >
                    Password strength
                </p>

                <button
                    id="resetBtn"

                    class="
                        w-full
                        bg-blue-600
                        text-white
                        py-4
                        rounded-xl
                        font-bold
                        mb-3
                    "
                >
                    Reset Password
                </button>

                <button
                    id="resendBtn"

                    class="
                        w-full
                        border
                        py-4
                        rounded-xl
                        font-bold
                    "
                >
                    Resend OTP
                </button>

            </div>

        </div>
    `;

    document
        .getElementById(
            "resetBtn"
        )
        .addEventListener(
            "click",
            resetPassword
        );

    document
        .getElementById(
            "resendBtn"
        )
        .addEventListener(
            "click",
            resendOTP
        );

    document
        .getElementById(
            "passwordInput"
        )
        .addEventListener(
            "input",
            updateStrength
        );

}



function updateStrength(){

    const password =
    document
        .getElementById(
            "passwordInput"
        )
        .value;

    const score =
    passwordScore(
        password
    );

    document
        .getElementById(
            "strengthText"
        )
        .textContent =
        "Password strength: " +
        passwordLabel(
            score
        );

}



function startCooldown(){

    state.cooldown = 60;

    if(
        state.timer
    ){
        clearInterval(
            state.timer
        );
    }

    state.timer =
    setInterval(
        () => {

            const btn =
            document
                .getElementById(
                    "resendBtn"
                );

            if(
                !btn
            ){
                return;
            }

            if(
                state.cooldown <= 0
            ){

                btn.disabled =
                false;

                btn.textContent =
                "Resend OTP";

                clearInterval(
                    state.timer
                );

                return;

            }

            btn.disabled =
            true;

            btn.textContent =
            "Resend in " +
            state.cooldown +
            "s";

            state.cooldown--;

        },
        1000
    );

}



async function resendOTP(){

    await sendOTP();

}



async function resetPassword(){

    const otp =
    document
        .getElementById(
            "otpInput"
        )
        .value
        .trim();

    const password =
    document
        .getElementById(
            "passwordInput"
        )
        .value;

    const resetBtn =
    document
        .getElementById(
            "resetBtn"
        );

    if(
        !validOTP(
            otp
        )
    ){
        alert(
            "OTP must be 6 digits"
        );
        return;
    }

    if(
        !validPassword(
            password
        )
    ){
        alert(
            "Password must contain upper, lower, number, symbol and be 8+ chars"
        );
        return;
    }

    resetBtn.disabled =
    true;

    resetBtn.textContent =
    "Updating...";

    try{

        const res =
        await fetch(
            API +
            "/api/auth/reset-password",
            {

                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:
                JSON.stringify({

                    email:
                    state.email,

                    otp,

                    new_password:
                    password

                })

            }
        );

        const data =
        await res.json();

        alert(
            data.message ||
            data.error ||
            "Failed"
        );

        if(
            res.ok
        ){

            window.location =
            "login.html";

        }

    }catch(err){

        alert(
            "Network error"
        );

    }finally{

        resetBtn.disabled =
        false;

        resetBtn.textContent =
        "Reset Password";

    }

}
</script>

</body>
    </html>
