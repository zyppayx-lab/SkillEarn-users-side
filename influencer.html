<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Influencer Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}
</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>


<div
    id="loader"
    class="
        fixed
        inset-0
        flex
        items-center
        justify-center
        bg-black/10
        z-50
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    ) || "{}"

);


if(!token){

    location =
    "login.html";

}



load();




async function load(){

    try{

        const res =
        await fetch(

            API +
            "/api/users/influencer-jobs",

            {

                headers:{

                    Authorization:
                    "Bearer " +
                    token

                }

            }

        );



        const list =
        await res.json();



        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render(

            Array.isArray(
                list
            )

            ?

            list

            :

            []

        );



    }catch(error){

        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render([]);

    }

}






function render(
    jobs
){

    document
    .getElementById(
        "app"
    )
    .innerHTML = `

        <div class="
            p-4
            pb-28
        ">




            <h1 class="
                text-2xl
                font-bold
                mb-5
            ">
                Influencer Jobs
            </h1>




            <div class="
                flex
                gap-2
                mb-5
                overflow-x-auto
            ">

                <a
                    href="jobs.html"
                    class="
                        bg-white
                        px-4
                        py-2
                        rounded-full
                        shadow
                        whitespace-nowrap
                    "
                >
                    Tasks
                </a>


                <a
                    href="freelance.html"
                    class="
                        bg-white
                        px-4
                        py-2
                        rounded-full
                        shadow
                        whitespace-nowrap
                    "
                >
                    Freelance
                </a>


                <a
                    href="hiring.html"
                    class="
                        bg-white
                        px-4
                        py-2
                        rounded-full
                        shadow
                        whitespace-nowrap
                    "
                >
                    Hiring
                </a>


                <a
                    href="influencer.html"
                    class="
                        bg-blue-600
                        text-white
                        px-4
                        py-2
                        rounded-full
                        whitespace-nowrap
                    "
                >
                    Influencer
                </a>

            </div>




            ${

                jobs.length

                ?

                jobs.map(

                    job => `

                        <div class="
                            bg-white
                            rounded-[28px]
                            p-5
                            shadow
                            mb-4
                        ">




                            <h3 class="
                                font-bold
                                text-lg
                                mb-2
                            ">

                                ${job.title || "Untitled"}

                            </h3>




                            <p class="
                                text-slate-600
                                mb-4
                            ">

                                ${job.description || ""}

                            </p>




                            <div class="
                                text-blue-600
                                font-bold
                                mb-4
                            ">

                                ${

                                    user.country==="NG"

                                    ?

                                    "₦"

                                    :

                                    "$"

                                }

                                ${Number(
                                    job.reward || 0
                                ).toLocaleString()}

                            </div>




                            <button

                                onclick="
                                    alert(
                                        'Apply feature next'
                                    )
                                "

                                class="
                                    w-full
                                    bg-blue-600
                                    text-white
                                    py-3
                                    rounded-2xl
                                    font-bold
                                "
                            >

                                Apply

                            </button>




                        </div>

                    `

                ).join("")

                :

                `

                    <div class="
                        bg-white
                        rounded-[28px]
                        p-6
                        text-center
                    ">

                        No influencer jobs

                    </div>

                `

            }




        </div>




        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            <a
                href="dashboard.html"
                class="
                    nav-btn
                    text-2xl
                "
            >
                🏠
            </a>


            <a
                href="jobs.html"
                class="
                    nav-btn
                    text-2xl
                "
            >
                💼
            </a>


            <a
                href="notifications.html"
                class="
                    nav-btn
                    text-2xl
                "
            >
                🔔
            </a>


            <a
                href="profile.html"
                class="
                    nav-btn
                    text-2xl
                "
            >
                👤
            </a>

        </div>

    `;

}

</script>

</body>
    </html>
