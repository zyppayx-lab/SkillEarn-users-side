<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Profile • SkillEarn</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 pb-24">

<div id="app"></div>


<script>

const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const app =
document.getElementById(
    "app"
);




load();




async function load(){

    const res =
    await fetch(
        API+
        "/api/users/wallet",
        {

            headers:{
                Authorization:
                "Bearer "+token
            }

        }
    );



    const user =
    await res.json();



    app.innerHTML=`

        <div class="
            p-4
        ">

            <div class="
                bg-white
                rounded-3xl
                p-6
                shadow
            ">

                <h1 class="
                    text-2xl
                    font-bold
                    mb-5
                ">
                    Profile
                </h1>



                <p class="
                    mb-3
                ">
                    Country:
                    ${user.country}
                </p>



                <p class="
                    mb-3
                ">
                    Balance:
                    ${user.balance}
                </p>



                <p class="
                    mb-6
                ">
                    Referral:
                    ${user.referral_code}
                </p>




                <button
                    onclick="
                        logout()
                    "

                    class="
                        bg-red-500
                        text-white
                        px-6
                        py-3
                        rounded-xl
                        font-bold
                    "
                >

                    Logout

                </button>

            </div>

        </div>

    `;

}




function logout(){

    localStorage.clear();

    location=
    "login.html";

}

</script>

</body>
</html>
