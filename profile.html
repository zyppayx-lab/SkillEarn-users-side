<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Profile</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.card{
    animation:slide .35s;
}

@keyframes slide{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>



<div
    id="loader"

    class="
        fixed
        inset-0
        flex
        items-center
        justify-center
        bg-black/10
        z-50
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    )

);


if(
    !token ||
    !user
){

    location =
    "login.html";

}



load();




function symbol(){

    if(
        user.country==="NG"
    ){

        return "₦";

    }


    return "$";

}






async function load(){

    try{

        const res =
        await fetch(

            API+
            "/api/users/wallet",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const wallet =
        await res.json();



        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render(
            wallet
        );



    }catch(error){

        location =
        "login.html";

    }

}






function render(
    wallet
){

    document
    .getElementById(
        "app"
    )
    .innerHTML = `

        <div class="
            p-4
            pb-28
        ">




            <!-- TOP -->
            <div class="
                text-center
                mb-6
            ">

                <div class="
                    w-24
                    h-24
                    rounded-full
                    bg-blue-600
                    mx-auto
                    text-white
                    flex
                    items-center
                    justify-center
                    text-3xl
                    font-bold
                    mb-3
                ">

                    ${user.name
                        .charAt(0)
                        .toUpperCase()}

                </div>



                <h1 class="
                    text-2xl
                    font-bold
                ">

                    ${user.name}

                </h1>

            </div>




            <!-- WALLET -->
            <div class="
                card
                bg-blue-600
                text-white
                rounded-[28px]
                p-6
                text-center
                shadow-xl
                mb-5
            ">

                <p>
                    Wallet Balance
                </p>



                <h2 class="
                    text-3xl
                    font-bold
                    mt-2
                ">

                    ${symbol()}
                    ${Number(
                        wallet.balance
                    ).toLocaleString()}

                </h2>

            </div>




            <!-- DETAILS -->
            <div class="
                card
                bg-white
                rounded-[28px]
                p-5
                shadow
                mb-5
            ">

                ${row(
                    "User ID",
                    user.id
                )}

                ${row(
                    "Full Name",
                    user.name
                )}

                ${row(
                    "Email",
                    user.email
                )}

                ${row(
                    "Country",
                    wallet.country
                )}

                ${row(
                    "Currency",
                    symbol()
                )}

            </div>




            <!-- REFERRAL -->
            <div class="
                card
                bg-white
                rounded-[28px]
                p-5
                shadow
                mb-5
            ">

                <div class="
                    flex
                    justify-between
                    items-center
                ">

                    <div>

                        <p class="
                            text-slate-500
                            text-sm
                        ">
                            Referral Code
                        </p>



                        <b>

                            ${wallet.referral_code}

                        </b>

                    </div>



                    <button

                        onclick="
                            copyReferral()
                        "

                        class="
                            bg-blue-600
                            text-white
                            px-4
                            py-2
                            rounded-xl
                        "
                    >

                        Copy

                    </button>

                </div>

            </div>




            <!-- ACTIONS -->
            <div class="
                grid
                gap-3
            ">

                <a

                    href="
                        withdraw.html
                    "

                    class="
                        bg-white
                        p-4
                        rounded-2xl
                        shadow
                    "
                >

                    💰 Withdraw

                </a>



                <a

                    href="
                        referrals.html
                    "

                    class="
                        bg-white
                        p-4
                        rounded-2xl
                        shadow
                    "
                >

                    🎁 Referrals

                </a>



                <button

                    onclick="
                        logout()
                    "

                    class="
                        bg-red-500
                        text-white
                        p-4
                        rounded-2xl
                    "
                >

                    Logout

                </button>

            </div>




        </div>




        <!-- NAV -->
        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav(
                "🏠",
                "dashboard.html"
            )}

            ${nav(
                "💰",
                "jobs.html"
            )}

            ${nav(
                "🔔",
                "notifications.html"
            )}

            ${nav(
                "👤",
                "profile.html"
            )}

        </div>

    `;

}






function row(
    title,
    value
){

    return `

        <div class="
            flex
            justify-between
            py-3
            border-b
        ">

            <span class="
                text-slate-500
            ">
                ${title}
            </span>



            <b>
                ${value}
            </b>

        </div>

    `;

}






function copyReferral(){

    navigator
    .clipboard
    .writeText(

        user.referral_code

    );



    alert(
        "Referral code copied"
    );

}






function logout(){

    localStorage.clear();

    location =
    "login.html";

}






function nav(
    icon,
    page
){

    return `

        <a

            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    `;

}

</script>

</body>
    </html>
