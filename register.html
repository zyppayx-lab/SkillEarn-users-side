async function register(){

showLoader();


try{

const res =
await fetch(

    API+
    "/api/auth/register",

    {

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:
        JSON.stringify({

            name:
            document
            .getElementById(
                "name"
            )
            .value,



            email:
            document
            .getElementById(
                "email"
            )
            .value,



            password:
            document
            .getElementById(
                "password"
            )
            .value,



            country:
            document
            .getElementById(
                "country"
            )
            .value,



            referral_code:
            document
            .getElementById(
                "referral"
            )
            .value

        })

    }

);


const data =
await res.json();


hideLoader();


const messages = {

    "OTP sent":
    "Verification code sent",

    "Email already registered":
    "This email already exists"

};


showToast(

    messages[
        data.message
    ] ||

    "Completed"

);



if(
    data.message ===
    "OTP sent"
){

localStorage.setItem(

    "register_email",

    document
    .getElementById(
        "email"
    )
    .value

);


setTimeout(
()=>{

window.location =
"verify-email.html";

},
1200
);

}


}catch(error){

hideLoader();

showToast(
    "Connection failed"
);

}

}





function showLoader(){

document
.getElementById(
    "loader"
)
.classList.remove(
    "hidden"
);

}



function hideLoader(){

document
.getElementById(
    "loader"
)
.classList.add(
    "hidden"
);

}



function showToast(
message
){

const toast =
document
.getElementById(
    "toast"
);


toast.innerHTML = `

<div class="
    toast
    bg-blue-600
    text-white
    px-5
    py-4
    rounded-2xl
    shadow-xl
    text-center
    font-semibold
">

    ${message}

</div>

`;


toast.classList.remove(
    "hidden"
);


setTimeout(
()=>{

toast.classList.add(
    "hidden"
);

},
2500
);

}
