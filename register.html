<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1
    "
>

<title>
    SkillEarn Register
</title>

<script src="
https://cdn.tailwindcss.com
"></script>


<style>

body{

    font-family:
    sans-serif;

}



.btn:active{

    transform:
    scale(.97);

}



.toast{

    animation:
    slideUp .35s;

}



@keyframes slideUp{

    from{

        transform:
        translateY(40px);

        opacity:0;

    }


    to{

        transform:
        translateY(0);

        opacity:1;

    }

}

</style>

</head>


<body class="
    bg-slate-100
">




<!-- APP -->
<div id="app"></div>




<!-- LOADER -->
<div
    id="loader"

    class="
        hidden
        fixed
        inset-0
        bg-black/10
        z-50
        flex
        items-center
        justify-center
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
        shadow-xl
    "></div>

</div>




<!-- TOAST -->
<div
    id="toast"

    class="
        hidden
        fixed
        bottom-6
        left-4
        right-4
        z-50
    "
></div>




<script>

"use strict";



const API =
"https://skillearn.onrender.com";



const app =
document.getElementById(
    "app"
);



render();




function render(){

    app.innerHTML = `

        <div class="
            min-h-screen
            flex
            items-center
            justify-center
            p-4
        ">



            <div class="
                w-full
                max-w-md
            ">




                <!-- LOGO -->
                <div class="
                    text-center
                    mb-8
                ">

                    <div class="
                        w-20
                        h-20
                        rounded-full
                        bg-blue-600
                        mx-auto
                        mb-4
                        flex
                        items-center
                        justify-center
                        text-white
                        text-3xl
                        font-bold
                        shadow-xl
                    ">

                        S

                    </div>



                    <h1 class="
                        text-3xl
                        font-bold
                    ">
                        SkillEarn
                    </h1>



                    <p class="
                        text-slate-500
                        mt-2
                    ">
                        Create your account
                    </p>

                </div>




                <!-- CARD -->
                <div class="
                    bg-white
                    rounded-[28px]
                    shadow-lg
                    p-6
                ">




                    <input
                        id="name"

                        placeholder="
                            Full name
                        "

                        class="
                            w-full
                            bg-slate-50
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >




                    <input
                        id="email"

                        type="email"

                        placeholder="
                            Email address
                        "

                        class="
                            w-full
                            bg-slate-50
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >




                    <input
                        id="password"

                        type="password"

                        placeholder="
                            Password
                        "

                        class="
                            w-full
                            bg-slate-50
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >




                    <select
                        id="country"

                        class="
                            w-full
                            bg-slate-50
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >

                        <option value="NG">
                            Nigeria
                        </option>

                        <option value="KE">
                            Kenya
                        </option>

                        <option value="US">
                            United States
                        </option>

                        <option value="GB">
                            United Kingdom
                        </option>

                        <option value="CA">
                            Canada
                        </option>

                        <option value="ZA">
                            South Africa
                        </option>

                    </select>




                    <input
                        id="referral"

                        placeholder="
                            Referral code (optional)
                        "

                        class="
                            w-full
                            bg-slate-50
                            border
                            p-4
                            rounded-2xl
                            mb-5
                        "
                    >




                    <button
                        id="registerBtn"

                        class="
                            btn
                            w-full
                            bg-blue-600
                            text-white
                            py-4
                            rounded-2xl
                            font-bold
                            text-lg
                        "
                    >

                        Create Account

                    </button>




                </div>

            </div>

        </div>

    `;



    document
    .getElementById(
        "registerBtn"
    )
    .addEventListener(
        "click",
        register
    );

}






async function register(){

    showLoader();




    try{

        const res =
        await fetch(

            API+

            "/api/auth/register",

            {

                method:"POST",


                headers:{
                    "Content-Type":
                    "application/json"
                },


                body:
                JSON.stringify({

                    name:
                    document
                    .getElementById(
                        "name"
                    )
                    .value,



                    email:
                    document
                    .getElementById(
                        "email"
                    )
                    .value,



                    password:
                    document
                    .getElementById(
                        "password"
                    )
                    .value,



                    country:
                    document
                    .getElementById(
                        "country"
                    )
                    .value,



                    referral_code:
                    document
                    .getElementById(
                        "referral"
                    )
                    .value

                })

            }

        );




        const data =
        await res.json();




        hideLoader();




        const messages = {

            "OTP sent":
            "Verification code sent",

            "Email already registered":
            "This email already exists"

        };




        showToast(

            messages[
                data.message
            ] ||

            "Completed"

        );




        if(

            data.message ===
            "OTP sent"

        ){

            localStorage.setItem(

                "register_email",

                document
                .getElementById(
                    "email"
                )
                .value

            );



            setTimeout(
                ()=>{

                    window.location =
                    "verify-email.html";

                },
                1200
            );

        }




    }catch(error){

        hideLoader();



        showToast(

            "Connection failed"

        );

    }

}






function showLoader(){

    document
    .getElementById(
        "loader"
    )
    .classList
    .remove(
        "hidden"
    );

}




function hideLoader(){

    document
    .getElementById(
        "loader"
    )
    .classList
    .add(
        "hidden"
    );

}




function showToast(
    message
){

    const toast =
    document
    .getElementById(
        "toast"
    );



    toast.innerHTML = `

        <div class="
            toast
            bg-blue-600
            text-white
            px-5
            py-4
            rounded-2xl
            shadow-xl
            text-center
            font-semibold
        ">

            ${message}

        </div>

    `;



    toast.classList.remove(
        "hidden"
    );



    setTimeout(
        ()=>{

            toast.classList.add(
                "hidden"
            );

        },
        2500
    );

}

</script>

</body>
  </html>
