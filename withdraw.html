<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Withdraw • SkillEarn</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-slate-100">

<div id="app"></div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const app =
document.getElementById(
    "app"
);



let user =
null;




if(!token){

    window.location=
    "login.html";

}




load();




function loader(){

    app.innerHTML=`

        <div class="
            min-h-screen
            flex
            justify-center
            items-center
        ">

            <div class="
                w-12
                h-12
                border-4
                border-blue-600
                border-t-transparent
                rounded-full
                animate-spin
            "></div>

        </div>

    `;

}




async function load(){

    loader();



    try{

        const res =
        await fetch(
            API+
            "/api/users/wallet",
            {

                headers:{
                    Authorization:
                    "Bearer "+token
                }

            }
        );



        user =
        await res.json();



        render();



    }catch(error){

        console.error(
            error
        );



        alert(
            "Failed to load"
        );

    }

}




function render(){

    const isNG =
    user.country ===
    "NG";



    const min =
    isNG
    ? 1000
    : 1;




    app.innerHTML=`

        <div class="
            p-4
            max-w-md
            mx-auto
        ">



            <div class="
                bg-white
                rounded-3xl
                p-6
                shadow
            ">

                <h1 class="
                    text-2xl
                    font-bold
                    mb-5
                ">
                    Withdraw
                </h1>




                <p class="
                    text-slate-500
                    mb-4
                ">

                    Minimum:
                    ${min}

                </p>




                <input
                    id="amount"

                    type="number"

                    placeholder="
                        Amount
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-4
                    "
                >




                ${isNG ?

                `

                <input
                    id="bank_name"

                    placeholder="
                        Bank name
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-4
                    "
                >



                <input
                    id="account_number"

                    placeholder="
                        Account number
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-4
                    "
                >



                <input
                    id="account_name"

                    placeholder="
                        Account name
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-4
                    "
                >

                `

                :

                `

                <input
                    id="crypto_address"

                    placeholder="
                        Wallet address
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-4
                    "
                >



                <input
                    id="crypto_network"

                    placeholder="
                        Network
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-4
                    "
                >

                `}




                <button
                    id="withdrawBtn"

                    class="
                        w-full
                        bg-blue-600
                        text-white
                        py-4
                        rounded-xl
                        font-bold
                    "
                >

                    Submit Withdrawal

                </button>

            </div>

        </div>

    `;




    document
    .getElementById(
        "withdrawBtn"
    )
    .addEventListener(
        "click",
        withdraw
    );

}




async function withdraw(){

    const button =
    document
    .getElementById(
        "withdrawBtn"
    );



    button.disabled =
    true;


    button.innerHTML =
    "Submitting...";



    const body = {

        amount:
        Number(
            document
            .getElementById(
                "amount"
            )
            .value
        )

    };



    if(
        user.country ===
        "NG"
    ){

        body.bank_name =
        document
        .getElementById(
            "bank_name"
        )
        .value;



        body.account_number =
        document
        .getElementById(
            "account_number"
        )
        .value;



        body.account_name =
        document
        .getElementById(
            "account_name"
        )
        .value;

    }else{

        body.crypto_address =
        document
        .getElementById(
            "crypto_address"
        )
        .value;



        body.crypto_network =
        document
        .getElementById(
            "crypto_network"
        )
        .value;

    }




    try{

        const res =
        await fetch(
            API+
            "/api/users/withdraw",
            {

                method:"POST",


                headers:{

                    Authorization:
                    "Bearer "+token,


                    "Content-Type":
                    "application/json"

                },


                body:
                JSON.stringify(
                    body
                )

            }
        );



        const data =
        await res.json();



        alert(
            data.message
        );



        if(
            data.message===
            "Withdrawal submitted"
        ){

            window.location=
            "dashboard.html";

        }



    }catch(error){

        console.error(
            error
        );



        alert(
            "Failed"
        );

    }




    button.disabled =
    false;


    button.innerHTML =
    "Submit Withdrawal";

}

</script>

</body>
    </html>
