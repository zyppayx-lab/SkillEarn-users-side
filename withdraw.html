<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Withdraw</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.toast{
    animation:slide .3s;
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>



<div
    id="loader"
    class="hidden fixed inset-0 bg-black/10 flex items-center justify-center z-50"
>
    <div class="w-16 h-16 rounded-full border-[5px] border-blue-100 border-t-blue-600 animate-spin bg-white"></div>
</div>



<div
    id="toast"
    class="hidden fixed bottom-5 left-4 right-4 z-50"
></div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(
    localStorage.getItem(
        "user"
    )
);


if(
    !token ||
    !user
){
    location =
    "login.html";
}



const banks = [

"Access Bank",
"Citibank",
"Ecobank",
"FCMB",
"Fidelity Bank",
"First Bank",
"Globus Bank",
"GTBank",
"Heritage Bank",
"Jaiz Bank",
"Keystone Bank",
"Polaris Bank",
"Providus Bank",
"Stanbic IBTC",
"Standard Chartered",
"Sterling Bank",
"SunTrust Bank",
"Titan Trust Bank",
"UBA",
"Union Bank",
"Wema Bank",
"Zenith Bank",

"OPay",
"PalmPay",
"Kuda",
"Moniepoint",
"Rubies",
"Sparkle",
"VFD",
"Mint",
"Eyowo"

];



const networks = [

"BTC",
"ETH",
"BEP20",
"TRC20",
"SOL",
"POLYGON",
"AVAX",
"ARB",
"BASE",
"LTC",
"DOGE",
"USDT-TRC20",
"USDT-BEP20",
"USDC"

];



render();




function currency(){

    if(
        user.country==="NG"
    ){
        return "₦";
    }

    return "$";

}






function render(){

    const isNG =
    user.country==="NG";



    document
    .getElementById(
        "app"
    )
    .innerHTML = `

        <div class="p-4 pb-28">

            <h1 class="
                text-2xl
                font-bold
                mb-5
            ">
                Withdraw
            </h1>




            <div class="
                bg-white
                rounded-[28px]
                p-5
                shadow
            ">




                <input

                    id="amount"

                    type="number"

                    placeholder="
                        Amount (${currency()})
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-2xl
                        mb-4
                    "
                >




                ${
                    isNG

                    ?

                    `

                    <select

                        id="bank"

                        class="
                            w-full
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >

                        ${

                            banks.map(

                                bank=>`

                                <option>
                                    ${bank}
                                </option>

                                `

                            ).join(
                                ""
                            )

                        }

                    </select>




                    <input

                        id="account_number"

                        placeholder="
                            Account Number
                        "

                        class="
                            w-full
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >




                    <input

                        id="account_name"

                        placeholder="
                            Account Name
                        "

                        class="
                            w-full
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >

                    `

                    :

                    `

                    <select

                        id="network"

                        class="
                            w-full
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >

                        ${

                            networks.map(

                                net=>`

                                <option>
                                    ${net}
                                </option>

                                `

                            ).join(
                                ""
                            )

                        }

                    </select>




                    <input

                        id="address"

                        placeholder="
                            Wallet Address
                        "

                        class="
                            w-full
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >

                    `
                }




                <button

                    onclick="
                        withdraw()
                    "

                    class="
                        w-full
                        bg-blue-600
                        text-white
                        py-4
                        rounded-2xl
                        font-bold
                    "
                >

                    Withdraw

                </button>





                <p class="
                    text-center
                    text-sm
                    text-slate-500
                    mt-4
                ">

                    Minimum:

                    ${
                        isNG

                        ?

                        "₦1000"

                        :

                        "$1"
                    }

                </p>

            </div>

        </div>




        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav("🏠","dashboard.html")}
            ${nav("💰","jobs.html")}
            ${nav("🔔","notifications.html")}
            ${nav("👤","profile.html")}

        </div>

    `;

}






async function withdraw(){

    showLoader();



    const isNG =
    user.country==="NG";



    const body = {

        amount:
        Number(

            document
            .getElementById(
                "amount"
            )
            .value

        )

    };



    if(
        isNG
    ){

        body.bank_name =
        document
        .getElementById(
            "bank"
        )
        .value;



        body.account_number =
        document
        .getElementById(
            "account_number"
        )
        .value;



        body.account_name =
        document
        .getElementById(
            "account_name"
        )
        .value;

    }

    else{

        body.crypto_network =
        document
        .getElementById(
            "network"
        )
        .value;



        body.crypto_address =
        document
        .getElementById(
            "address"
        )
        .value;

    }



    try{

        const res =
        await fetch(

            API+
            "/api/users/withdraw",

            {

                method:"POST",


                headers:{

                    Authorization:
                    "Bearer "+
                    token,

                    "Content-Type":
                    "application/json"

                },


                body:
                JSON.stringify(
                    body
                )

            }

        );



        const data =
        await res.json();



        hideLoader();



        const messages = {

            "Below minimum":
            "Amount is below minimum withdrawal",

            "Insufficient balance":
            "Your wallet balance is insufficient",

            "Withdrawal submitted":
            "Withdrawal submitted successfully"

        };



        toast(

            messages[
                data.message
            ] ||

            "Completed"

        );



    }catch(error){

        hideLoader();

        toast(
            "Connection failed"
        );

    }

}






function showLoader(){

    document
    .getElementById(
        "loader"
    )
    .classList.remove(
        "hidden"
    );

}






function hideLoader(){

    document
    .getElementById(
        "loader"
    )
    .classList.add(
        "hidden"
    );

}






function toast(
    message
){

    const box =
    document
    .getElementById(
        "toast"
    );



    box.innerHTML = `

        <div class="
            toast
            bg-blue-600
            text-white
            px-5
            py-4
            rounded-2xl
            text-center
            shadow-xl
        ">

            ${message}

        </div>

    `;



    box.classList.remove(
        "hidden"
    );



    setTimeout(

        ()=>{

            box.classList.add(
                "hidden"
            );

        },

        2500

    );

}






function nav(
    icon,
    page
){

    return `

        <a
            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    `;

}

</script>

</body>
    </html>
