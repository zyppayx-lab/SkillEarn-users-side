<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SkillEarn Withdraw</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-slate-100">

<div id="screen"></div>



<script>

const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);



let userCountry;



load();




function loader(){

    screen.innerHTML=`

        <div class="
            min-h-screen
            flex
            justify-center
            items-center
        ">

            <div class="
                w-12
                h-12
                border-4
                border-blue-600
                border-t-transparent
                rounded-full
                animate-spin
            "></div>

        </div>

    `;

}




async function load(){

    loader();



    const res =
    await fetch(
        API+"/api/users/wallet",
        {

            headers:{
                Authorization:
                "Bearer "+token
            }

        }
    );



    const user =
    await res.json();



    userCountry =
    user.country;



    renderForm(
        user
    );

}




function renderForm(user){

    const isNG =
    user.country==="NG";


    const min =
    isNG
    ? 1000
    : 1;


    const currency =
    isNG
    ? "₦"
    : "$";



    screen.innerHTML=`

        <div class="
            max-w-md
            mx-auto
            p-4
        ">



            <div class="
                bg-blue-600
                text-white
                rounded-3xl
                p-6
                mb-5
            ">

                <p>
                    Available Balance
                </p>


                <h2 class="
                    text-3xl
                    font-bold
                    mt-2
                ">

                    ${currency}
                    ${user.balance}

                </h2>

            </div>




            <div class="
                bg-white
                rounded-3xl
                p-6
                shadow
            ">

                <p class="
                    text-slate-500
                    mb-5
                ">

                    Minimum withdrawal:
                    ${currency}${min}

                </p>




                <input
                    id="amount"

                    type="number"

                    placeholder="
                        Amount
                    "

                    class="
                        w-full
                        border
                        p-4
                        rounded-xl
                        mb-4
                    "
                >




                ${
                    isNG
                    ?

                    `

                    <input
                        id="bank_name"

                        placeholder="
                            Bank name
                        "

                        class="
                            w-full
                            border
                            p-4
                            rounded-xl
                            mb-4
                        "
                    >



                    <input
                        id="account_number"

                        placeholder="
                            Account number
                        "

                        class="
                            w-full
                            border
                            p-4
                            rounded-xl
                            mb-4
                        "
                    >



                    <input
                        id="account_name"

                        placeholder="
                            Account name
                        "

                        class="
                            w-full
                            border
                            p-4
                            rounded-xl
                            mb-4
                        "
                    >

                    `

                    :

                    `

                    <input
                        id="crypto_address"

                        placeholder="
                            Wallet address
                        "

                        class="
                            w-full
                            border
                            p-4
                            rounded-xl
                            mb-4
                        "
                    >



                    <input
                        id="crypto_network"

                        placeholder="
                            Network
                        "

                        class="
                            w-full
                            border
                            p-4
                            rounded-xl
                            mb-4
                        "
                    >

                    `
                }




                <button
                    id="withdrawBtn"

                    onclick="
                        withdraw()
                    "

                    class="
                        w-full
                        bg-blue-600
                        text-white
                        py-4
                        rounded-xl
                        font-bold
                    "
                >

                    Withdraw

                </button>

            </div>

        </div>

    `;

}




async function withdraw(){

    const isNG =
    userCountry==="NG";


    const amount =
    Number(
        document.getElementById(
            "amount"
        ).value
    );



    if(
        isNG &&
        amount<1000
    ){

        alert(
            "Minimum withdrawal is ₦1000"
        );

        return;

    }




    if(
        !isNG &&
        amount<1
    ){

        alert(
            "Minimum withdrawal is $1"
        );

        return;

    }




    withdrawBtn.disabled=true;


    withdrawBtn.innerHTML=
    "Processing...";




    const payload={

        amount:amount

    };




    if(isNG){

        payload.bank_name =
        bank_name.value;


        payload.account_number =
        account_number.value;


        payload.account_name =
        account_name.value;

    }


    else{

        payload.crypto_address =
        crypto_address.value;


        payload.crypto_network =
        crypto_network.value;

    }




    try{

        const res =
        await fetch(
            API+
            "/api/users/withdraw",
            {

                method:"POST",

                headers:{

                    "Content-Type":
                    "application/json",

                    Authorization:
                    "Bearer "+token

                },

                body:
                JSON.stringify(
                    payload
                )

            }
        );



        const data =
        await res.json();



        alert(
            data.message
        );



        if(
            data.message===
            "Withdrawal submitted"
        ){

            window.location=
            "profile.html";

        }



    }catch(err){

        alert(
            "Network error"
        );

    }




    withdrawBtn.disabled=false;


    withdrawBtn.innerHTML=
    "Withdraw";

}


</script>

</body>
  </html>
