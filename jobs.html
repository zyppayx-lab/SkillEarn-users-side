<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillEarn</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="app" class="min-h-screen pb-20"><!-- Top Bar -->
<header class="bg-blue-600 text-white px-4 py-4 shadow-md sticky top-0 z-50">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <h1 class="text-xl font-bold">SkillEarn</h1>
    <button onclick="logout()" class="text-sm">Logout</button>
  </div>
</header>

<!-- Main Content -->
<main id="screen" class="max-w-6xl mx-auto p-4"></main>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3">
  <button onclick="loadDashboard()">Dashboard</button>
  <button onclick="loadTasks()">Jobs</button>
  <button onclick="loadNotifications()">Notifications</button>
  <button onclick="loadProfile()">Profile</button>
</nav>

  </div><script>
"use strict";

const APP = document.getElementById("app");
const LOADER = document.getElementById("loader");
const MODAL = document.getElementById("modal");

const API = "https://skillearn.onrender.com";
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "{}");

if(!token){
  location = "login.html";
}

function authHeaders(){
  return {
    Authorization: "Bearer " + token
  };
}

async function fetchJobs(endpoint){
  try{
    const res = await fetch(API + endpoint, {
      headers: authHeaders()
    });

    if(!res.ok) return [];

    const data = await res.json();

    return Array.isArray(data) ? data : [];

  }catch{
    return [];
  }
}

async function load(){

  LOADER.style.display = "flex";

  const results = await Promise.allSettled([
    fetchJobs("/api/users/tasks"),
    fetchJobs("/api/users/freelance-jobs"),
    fetchJobs("/api/users/hiring-jobs"),
    fetchJobs("/api/users/influencer-jobs")
  ]);

  const tasks = results[0].status === "fulfilled" ? results[0].value : [];
  const freelance = results[1].status === "fulfilled" ? results[1].value : [];
  const hiring = results[2].status === "fulfilled" ? results[2].value : [];
  const influencer = results[3].status === "fulfilled" ? results[3].value : [];

  const jobs = [
    ...tasks.map(x => ({...x, type:"TASK"})),
    ...freelance.map(x => ({...x, type:"FREELANCE"})),
    ...hiring.map(x => ({...x, type:"HIRING"})),
    ...influencer.map(x => ({...x, type:"INFLUENCER"}))
  ];

  LOADER.style.display = "none";

  render(jobs);
}

function currency(){
  return user.country === "NG" ? "₦" : "$";
}

function render(jobs){
  APP.innerHTML = `<div class="p-4 pb-28"><h1 class="text-2xl font-bold mb-5">Available Jobs</h1>${jobs.length ? jobs.map(card).join("") : empty()}</div>`;
}

function card(job){
  return `<div id="job-${job.id}" class="bg-white rounded-[28px] p-5 shadow mb-4"><div class="flex justify-between mb-3"><h3 class="font-bold text-lg">${job.title || "Untitled"}</h3><span class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">${job.type}</span></div><p class="text-slate-600 mb-4">${job.description || ""}</p><div class="text-blue-600 font-bold mb-4">${currency()}${Number(job.reward || 0).toLocaleString()}</div></div>`;
}

function empty(){
  return `<div class="bg-white rounded-[28px] p-6 text-center">No jobs available</div>`;
}

load();
</script></body>
</html>
