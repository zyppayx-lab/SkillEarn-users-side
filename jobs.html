<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jobs</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div id="app"></div>

<div id="loader"
class="fixed inset-0 flex items-center justify-center bg-black/10">

Loading...

</div>


<script>

"use strict";

const API =
"https://skillearn.onrender.com";

const token =
localStorage.getItem(
    "token"
);

const app =
document.getElementById(
    "app"
);

const loader =
document.getElementById(
    "loader"
);


test();


async function test(){

    try{

        app.innerHTML =
        "<h1 class='p-5'>Fetching...</h1>";


        const res =
        await fetch(

            API+
            "/api/users/tasks",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );


        loader.style.display =
        "none";


        app.innerHTML =

        "<div class='p-5 text-xl'>" +

        "Status: " +

        res.status +

        "</div>";


    }catch(error){

        loader.style.display =
        "none";


        app.innerHTML =

        "<div class='p-5 text-red-600'>" +

        error.message +

        "</div>";

    }

}

            </script>

</body>
</html>
