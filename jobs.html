<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family:sans-serif;
}

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.float-card{
    animation:floatCard 3s infinite;
}

@keyframes floatCard{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-3px);
    }

    100%{
        transform:translateY(0);
    }

}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>


<div
    id="loader"

    class="
        fixed
        inset-0
        bg-black/10
        z-50
        flex
        items-center
        justify-center
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    ) || "{}"

);



if(!token){

    location =
    "login.html";

}



let jobs =
[];



load();





function currency(){

    if(
        user.country==="NG"
    ){

        return "₦";

    }


    return "$";

}





async function load(){

    try{


        const res =
        await fetch(

            API+
            "/api/users/tasks",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        jobs =
        await res.json();



        if(
            !Array.isArray(
                jobs
            )
        ){

            jobs =
            [];

        }



        loader.style.display =
        "none";



        render();



    }catch{


        loader.style.display =
        "none";


        jobs =
        [];


        render();

    }

}





function render(){

    app.innerHTML = `

        <div class="
            pb-28
            p-4
        ">




            <h2 class="
                text-2xl
                font-bold
                mb-4
            ">
                Jobs
            </h2>




            <!-- categories -->
            <div class="
                flex
                gap-2
                mb-5
                overflow-x-auto
            ">

                ${tab(
                    "📱 Tasks",
                    "jobs.html"
                )}

                ${tab(
                    "💻 Freelancing",
                    "freelance.html"
                )}

                ${tab(
                    "🏢 Hiring",
                    "hiring.html"
                )}

                ${tab(
                    "⭐ Influencer",
                    "influencer.html"
                )}

            </div>




            ${

                jobs.length

                ?

                jobs.map(
                    card
                ).join("")

                :

                empty()

            }



        </div>




        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            shadow-2xl
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav("🏠","dashboard.html")}
            ${nav("💼","jobs.html")}
            ${nav("🔔","notifications.html")}
            ${nav("👤","profile.html")}

        </div>

    `;

}





function card(
    job
){

    return `

        <div class="
            float-card
            bg-white
            rounded-[28px]
            p-5
            shadow
            mb-5
        ">




            <div class="
                flex
                justify-between
                mb-3
            ">

                <span class="
                    bg-blue-100
                    text-blue-700
                    px-3
                    py-1
                    rounded-full
                    text-xs
                    font-bold
                ">
                    TASK
                </span>



                <b class="
                    text-blue-600
                ">

                    ${currency()}
                    ${Number(
                        job.reward || 0
                    ).toLocaleString()}

                </b>

            </div>




            <h3 class="
                text-lg
                font-bold
                mb-3
            ">

                ${job.title || "Untitled"}

            </h3>




            <p class="
                text-slate-500
                mb-5
            ">

                ${job.description || ""}

            </p>




            <button

                onclick="
                    handleTask(
                        ${job.id}
                    )
                "

                class="
                    w-full
                    bg-blue-600
                    text-white
                    py-3
                    rounded-2xl
                    font-bold
                "

                id="
                    btn-${job.id}
                "

            >

                Apply

            </button>



        </div>

    ";

}





async function handleTask(
    taskId
){

    const btn =
    document.getElementById(

        "btn-"+taskId

    );



    if(

        btn.innerText ===
        "Apply"

    ){

        btn.innerText =
        "Submit Proof";


        return;

    }



    const proof =
    prompt(
        "Paste proof link"
    );



    if(
        !proof
    ){

        return;

    }



    btn.innerText =
    "Submitting...";



    try{


        const res =
        await fetch(

            API+
            "/api/users/submit-task",

            {

                method:
                "POST",


                headers:{

                    Authorization:
                    "Bearer "+
                    token,

                    "Content-Type":
                    "application/json"

                },


                body:
                JSON.stringify({

                    task_id:
                    taskId,

                    proof:
                    proof

                })

            }

        );



        if(
            !res.ok
        ){

            throw "";

        }



        btn.innerText =
        "Submitted ✅";


        btn.disabled =
        true;



    }catch{


        btn.innerText =
        "Submit Proof";

    }

}





function empty(){

    return `

        <div class="
            bg-white
            rounded-[28px]
            p-8
            text-center
            shadow
        ">

            No tasks available

        </div>

    ";

}





function tab(
    text,
    page
){

    return `

        <a

            href="${page}"

            class="
                whitespace-nowrap
                bg-white
                shadow
                px-4
                py-2
                rounded-full
                font-semibold
            "
        >

            ${text}

        </a>

    ";

}





function nav(
    icon,
    page
){

    return `

        <a

            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    ";

}

</script>

</body>
    </html>
