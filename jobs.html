<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.modal{
    animation:pop .25s;
}

@keyframes pop{

    from{
        transform:scale(.8);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }

}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>



<div
    id="loader"

    class="
        fixed
        inset-0
        flex
        items-center
        justify-center
        bg-black/10
        z-50
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<div id="modal"></div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(
    localStorage.getItem(
        "user"
    )
);


if(!token){

    location =
    "login.html";

}



load();




async function load(){

    try{

        const res =
        await fetch(

            API+
            "/api/users/tasks",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const jobs =
        await res.json();



        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render(
            jobs
        );



    }catch(error){

        location =
        "login.html";

    }

}






function currency(){

    if(
        user.country==="NG"
    ){

        return "₦";

    }

    return "$";

}






function render(
    jobs
){

    document
    .getElementById(
        "app"
    )
    .innerHTML = `

        <div class="
            p-4
            pb-28
        ">


            <h1 class="
                text-2xl
                font-bold
                mb-5
            ">
                Available Jobs
            </h1>




            ${

                jobs.map(

                    job=>card(
                        job
                    )

                ).join(
                    ""
                )

            }


        </div>




        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav("🏠","dashboard.html")}
            ${nav("💰","jobs.html")}
            ${nav("🔔","notifications.html")}
            ${nav("👤","profile.html")}

        </div>

    `;

}






function card(
    job
){

    const reward =
    Number(
        job.reward
    )
    .toLocaleString();



    const category =
    job.category ||
    "GENERAL";



    return `

        <div class="
            bg-white
            rounded-[28px]
            p-5
            shadow
            mb-4
        ">




            <div class="
                flex
                justify-between
                mb-3
            ">

                <h3 class="
                    font-bold
                    text-lg
                ">
                    ${job.title}
                </h3>



                <span class="
                    text-xs
                    bg-blue-100
                    text-blue-700
                    px-3
                    py-1
                    rounded-full
                ">

                    ${category}

                </span>

            </div>




            <p class="
                text-slate-600
                mb-4
            ">

                ${job.description}

            </p>




            <div class="
                text-blue-600
                font-bold
                mb-4
            ">

                ${currency()}
                ${reward}

            </div>




            <button

                onclick="
                    submitTask(
                        ${job.id},
                        '${category}'
                    )
                "

                class="
                    w-full
                    bg-blue-600
                    text-white
                    py-3
                    rounded-2xl
                    font-bold
                "
            >

                Submit Job

            </button>

        </div>

    `;

}






function submitTask(
    taskId,
    category
){

    let label =
    "Proof link / text";



    if(
        category==="APP"
    ){

        label =
        "Screenshot URL";

    }



    if(
        category==="SURVEY"
    ){

        label =
        "Completion code";

    }



    if(
        category==="FREELANCE"
    ){

        label =
        "Portfolio / file URL";

    }



    if(
        category==="INFLUENCER"
    ){

        label =
        "Post URL";

    }



    const proof =
    prompt(
        label
    );



    if(!proof){

        return;

    }



    saveTask(
        taskId,
        proof
    );

}






async function saveTask(
    taskId,
    proof
){

    document
    .getElementById(
        "loader"
    )
    .style.display =
    "flex";



    try{

        await fetch(

            API+
            "/api/users/submit-task",

            {

                method:"POST",


                headers:{

                    Authorization:
                    "Bearer "+
                    token,


                    "Content-Type":
                    "application/json"

                },


                body:
                JSON.stringify({

                    task_id:
                    taskId,


                    proof

                })

            }

        );



        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        popup(
            "Job submitted successfully"
        );



    }catch(error){

        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        popup(
            "Connection failed"
        );

    }

}






function popup(
    message
){

    document
    .getElementById(
        "modal"
    )
    .innerHTML = `

        <div class="
            fixed
            inset-0
            bg-black/20
            flex
            items-center
            justify-center
            z-50
        ">


            <div class="
                modal
                bg-white
                rounded-[28px]
                p-6
                text-center
                w-[90%]
                max-w-sm
            ">

                <div class="
                    text-5xl
                    mb-4
                ">
                    ✅
                </div>


                <p class="
                    font-bold
                ">
                    ${message}
                </p>

            </div>

        </div>

    `;



    setTimeout(

        ()=>{

            document
            .getElementById(
                "modal"
            )
            .innerHTML =
            "";

        },

        2000

    );

}






function nav(
    icon,
    page
){

    return `

        <a

            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    `;

}

</script>

</body>
    </html>
