<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family:sans-serif;
}

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.active-tab{
    background:#2563eb;
    color:white;
}

.fade{
    animation:fade .3s;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>


<div
    id="loader"

    class="
        fixed
        inset-0
        bg-black/10
        z-50
        flex
        items-center
        justify-center
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    ) || "{}"

);



if(!token){

    location =
    "login.html";

}



let current =
"TASK";



load(
    "TASK"
);





function currency(){

    if(
        user.country==="NG"
    ){

        return "₦";

    }


    return "$";

}





function endpoint(
    type
){

    if(
        type==="TASK"
    ){

        return "/api/users/tasks";

    }


    if(
        type==="FREELANCE"
    ){

        return
        "/api/users/freelance-jobs";

    }


    if(
        type==="HIRING"
    ){

        return
        "/api/users/hiring-jobs";

    }


    return
    "/api/users/influencer-jobs";

}





async function load(
    type
){

    current =
    type;


    loader.style.display =
    "flex";


    try{


        const res =
        await fetch(

            API+
            endpoint(
                type
            ),

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const jobs =
        await res.json();



        loader.style.display =
        "none";



        render(

            Array.isArray(
                jobs
            )

            ?

            jobs.map(

                x=>({

                    ...x,

                    type

                })

            )

            :

            []

        );



    }catch{


        loader.style.display =
        "none";


        render(
            []
        );

    }

}





function render(
    jobs
){

    app.innerHTML = `

        <div class="
            p-4
            pb-28
        ">



            <h1 class="
                text-2xl
                font-bold
                mb-4
            ">
                Jobs
            </h1>




            <!-- CATEGORIES -->
            <div class="
                flex
                gap-2
                overflow-x-auto
                mb-5
            ">

                ${tab("TASK")}
                ${tab("FREELANCE")}
                ${tab("INFLUENCER")}
                ${tab("HIRING")}

            </div>




            ${

                jobs.length

                ?

                jobs.map(
                    card
                ).join("")

                :

                empty()

            }



        </div>




        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav("🏠","dashboard.html")}
            ${nav("💼","jobs.html")}
            ${nav("🔔","notifications.html")}
            ${nav("👤","profile.html")}

        </div>

    `;

}





function tab(
    type
){

    return `

        <button

            onclick="
                load(
                    '${type}'
                )
            "

            class="
                px-4
                py-2
                rounded-full
                bg-white
                shadow
                whitespace-nowrap

                ${

                    current===type

                    ?

                    "active-tab"

                    :

                    ""

                }
            "
        >

            ${type}

        </button>

    ";

}





function card(
    job
){

    return `

        <div class="
            fade
            bg-white
            rounded-[28px]
            p-5
            shadow
            mb-4
        ">



            <div class="
                flex
                justify-between
                mb-3
            ">


                <b>

                    ${job.title || "Untitled"}

                </b>



                <span class="
                    text-xs
                    bg-blue-100
                    text-blue-700
                    px-3
                    py-1
                    rounded-full
                ">

                    ${job.type}

                </span>

            </div>




            <p class="
                text-slate-500
                mb-4
            ">

                ${job.description || ""}

            </p>




            <b class="
                text-blue-600
            ">

                ${currency()}
                ${Number(
                    job.reward || 0
                ).toLocaleString()}

            </b>



        </div>

    ";

}





function empty(){

    return `

        <div class="
            bg-white
            rounded-[28px]
            p-6
            text-center
        ">

            No jobs available

        </div>

    ";

}





function nav(
    icon,
    page
){

    return `

        <a

            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    ";

}

</script>

</body>
</html>
