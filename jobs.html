<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.modal{
    animation:pop .25s;
}

@keyframes pop{

    from{
        transform:scale(.8);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }

}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>


<div
    id="loader"

    class="
        fixed
        inset-0
        flex
        items-center
        justify-center
        bg-black/10
        z-50
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>


<div id="modal"></div>


<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    ) || "{}"

);


if(!token){

    location =
    "login.html";

}


load();



function authHeader(){

    return {

        headers:{

            Authorization:
            "Bearer "+
            token

        }

    };

}



async function load(){

    try{

        loader.style.display =
        "flex";


        const responses =
        await Promise.all([

            fetch(
                API+
                "/api/users/tasks",
                authHeader()
            ),

            fetch(
                API+
                "/api/users/freelance-jobs",
                authHeader()
            ),

            fetch(
                API+
                "/api/users/hiring-jobs",
                authHeader()
            ),

            fetch(
                API+
                "/api/users/influencer-jobs",
                authHeader()
            )

        ]);


        const tasks =
        await responses[0].json();

        const freelance =
        await responses[1].json();

        const hiring =
        await responses[2].json();

        const influencer =
        await responses[3].json();


        const jobs = [

            ...tasks.map(
                x=>({
                    ...x,
                    type:"TASK"
                })
            ),

            ...freelance.map(
                x=>({
                    ...x,
                    type:"FREELANCE"
                })
            ),

            ...hiring.map(
                x=>({
                    ...x,
                    type:"HIRING"
                })
            ),

            ...influencer.map(
                x=>({
                    ...x,
                    type:"INFLUENCER"
                })
            )

        ];


        render(
            jobs
        );


    }catch{

        popup(
            "Connection failed"
        );

    }


    loader.style.display =
    "none";

}



function currency(){

    if(
        user.country==="NG"
    ){

        return "₦";

    }


    return "$";

}



function render(
    jobs
){

    app.innerHTML = `

        <div class="
            p-4
            pb-28
        ">


            <h1 class="
                text-2xl
                font-bold
                mb-5
            ">
                Available Jobs
            </h1>


            ${

                jobs.length

                ?

                jobs.map(
                    card
                ).join(
                    ""
                )

                :

                empty()

            }


        </div>


        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav("🏠","dashboard.html")}
            ${nav("💼","jobs.html")}
            ${nav("🔔","notifications.html")}
            ${nav("👤","profile.html")}

        </div>

    `;

}



function card(
    job
){

    return `

        <div
            id="job-${job.id}"

            class="
                bg-white
                rounded-[28px]
                p-5
                shadow
                mb-4
            "
        >


            <div class="
                flex
                justify-between
                mb-3
            ">

                <h3 class="
                    font-bold
                    text-lg
                ">
                    ${job.title}
                </h3>


                <span class="
                    text-xs
                    bg-blue-100
                    text-blue-700
                    px-3
                    py-1
                    rounded-full
                ">

                    ${job.type}

                </span>

            </div>


            <p class="
                text-slate-600
                mb-4
            ">

                ${job.description || ""}

            </p>


            <div class="
                text-blue-600
                font-bold
                mb-4
            ">

                ${currency()}
                ${Number(
                    job.reward || 0
                ).toLocaleString()}

            </div>


            <button

                id="btn-${job.id}"

                onclick="
                    applyJob(
                        ${job.id},
                        '${job.type}'
                    )
                "

                class="
                    w-full
                    bg-blue-600
                    text-white
                    py-3
                    rounded-2xl
                    font-bold
                "
            >

                Apply

            </button>


        </div>

    ";

}



async function applyJob(
    jobId,
    type
){

    const button =
    document.getElementById(
        "btn-"+jobId
    );


    button.disabled =
    true;


    button.innerHTML =
    "Processing...";


    let endpoint =
    "";

    let payload =
    {};


    if(
        type==="TASK"
    ){

        const proof =
        prompt(
            "Proof"
        );


        if(!proof){

            resetButton(
                button
            );

            return;

        }


        endpoint =
        "/api/users/submit-task";

        payload = {

            task_id:
            jobId,

            proof

        };

    }


    if(
        type==="FREELANCE"
    ){

        const proposal =
        prompt(
            "Proposal"
        );


        if(!proposal){

            resetButton(
                button
            );

            return;

        }


        endpoint =
        "/api/users/apply-freelance";

        payload = {

            job_id:
            jobId,

            proposal

        };

    }


    if(
        type==="HIRING"
    ){

        const cv =
        prompt(
            "CV Link"
        );


        if(!cv){

            resetButton(
                button
            );

            return;

        }


        endpoint =
        "/api/users/apply-hiring";

        payload = {

            job_id:
            jobId,

            cv_link:
            cv

        };

    }


    if(
        type==="INFLUENCER"
    ){

        const portfolio =
        prompt(
            "Portfolio Link"
        );


        if(!portfolio){

            resetButton(
                button
            );

            return;

        }


        endpoint =
        "/api/users/apply-influencer";

        payload = {

            job_id:
            jobId,

            portfolio_link:
            portfolio

        };

    }


    try{

        const res =
        await fetch(

            API+
            endpoint,

            {

                method:"POST",

                headers:{

                    Authorization:
                    "Bearer "+
                    token,

                    "Content-Type":
                    "application/json"

                },

                body:
                JSON.stringify(
                    payload
                )

            }

        );


        if(
            !res.ok
        ){

            throw new Error();

        }


        document
        .getElementById(
            "job-"+jobId
        )
        .remove();


        popup(
            "Application successful"
        );


    }catch{

        resetButton(
            button
        );

        popup(
            "Could not apply"
        );

    }

}



function resetButton(
    button
){

    button.disabled =
    false;


    button.innerHTML =
    "Apply";

}



function popup(
    message
){

    modal.innerHTML = `

        <div class="
            fixed
            inset-0
            bg-black/20
            flex
            items-center
            justify-center
            z-50
        ">


            <div class="
                modal
                bg-white
                rounded-[28px]
                p-6
                text-center
                w-[90%]
                max-w-sm
            ">

                <div class="
                    text-5xl
                    mb-4
                ">
                    ✅
                </div>


                <p class="
                    font-bold
                ">
                    ${message}
                </p>

            </div>

        </div>

    `;


    setTimeout(

        ()=>{

            modal.innerHTML =
            "";

        },

        2000

    );

}



function empty(){

    return `

        <div class="
            bg-white
            rounded-[28px]
            p-6
            text-center
        ">

            No jobs available

        </div>

    `;

}



function nav(
    icon,
    page
){

    return `

        <a

            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    ";

}

</script>

</body>
    </html>
