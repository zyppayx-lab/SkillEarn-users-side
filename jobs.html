<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SkillEarn Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-slate-100 pb-24">

<div id="screen"></div>



<!-- NAV -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t">

    <div class="grid grid-cols-4 text-center">

        <button onclick="window.location='dashboard.html'" class="p-4">
            Dashboard
        </button>

        <button class="p-4 text-blue-600 font-bold">
            Jobs
        </button>

        <button onclick="window.location='notifications.html'" class="p-4">
            Notifications
        </button>

        <button onclick="window.location='profile.html'" class="p-4">
            Profile
        </button>

    </div>

</div>



<script>

const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);



loadJobs();




function loader(){

    screen.innerHTML=`

        <div class="
            min-h-screen
            flex
            justify-center
            items-center
        ">

            <div class="
                w-12
                h-12
                border-4
                border-blue-600
                border-t-transparent
                rounded-full
                animate-spin
            "></div>

        </div>

    `;

}




async function loadJobs(){

    loader();


    const res =
    await fetch(
        API+"/api/users/tasks",
        {

            headers:{
                Authorization:
                "Bearer "+token
            }

        }
    );


    const tasks =
    await res.json();




    screen.innerHTML=
    tasks.map(
        task=>`

        <div class="
            bg-white
            rounded-3xl
            p-5
            shadow
            m-4
        ">

            <h2 class="
                text-xl
                font-bold
                mb-2
            ">
                ${task.title}
            </h2>



            <p class="
                text-slate-500
                mb-3
            ">
                ${task.description}
            </p>



            <p class="
                font-bold
                text-blue-600
                mb-4
            ">
                Reward:
                ${task.reward}
            </p>




            ${renderProofField(task)}




            <button
                id="btn_${task.id}"

                onclick="
                    submitTask(
                        ${task.id}
                    )
                "

                class="
                    w-full
                    bg-blue-600
                    text-white
                    py-3
                    rounded-xl
                    mt-4
                "
            >

                Submit Proof

            </button>

        </div>

        `
    ).join("");

}




function renderProofField(task){

    const type =
    (
        task.category ||
        task.type ||
        ""
    ).toLowerCase();




    if(
        type.includes(
            "survey"
        )
    ){

        return `

            <input
                id="proof_${task.id}"

                placeholder="
                    Survey completion ID
                "

                class="
                    w-full
                    border
                    p-4
                    rounded-xl
                "
            >

        `;

    }




    if(
        type.includes(
            "social"
        ) ||

        type.includes(
            "youtube"
        ) ||

        type.includes(
            "telegram"
        )
    ){

        return `

            <input
                id="proof_${task.id}"

                placeholder="
                    Username or profile link
                "

                class="
                    w-full
                    border
                    p-4
                    rounded-xl
                "
            >

        `;

    }




    if(
        type.includes(
            "app"
        ) ||

        type.includes(
            "screenshot"
        )
    ){

        return `

            <input
                id="proof_${task.id}"

                placeholder="
                    Screenshot URL
                "

                class="
                    w-full
                    border
                    p-4
                    rounded-xl
                "
            >

        `;

    }




    return `

        <textarea
            id="proof_${task.id}"

            placeholder="
                Enter proof
            "

            class="
                w-full
                border
                p-4
                rounded-xl
            "
        ></textarea>

    `;

}




async function submitTask(
    taskId
){

    const btn =
    document.getElementById(
        "btn_"+taskId
    );



    const proof =
    document.getElementById(
        "proof_"+taskId
    ).value;



    btn.disabled=true;


    btn.innerHTML=
    "Submitting...";




    try{

        const res =
        await fetch(
            API+
            "/api/users/submit-task",
            {

                method:"POST",

                headers:{

                    "Content-Type":
                    "application/json",

                    Authorization:
                    "Bearer "+token

                },

                body:JSON.stringify({

                    task_id:taskId,

                    proof:proof

                })

            }
        );



        const data =
        await res.json();



        alert(
            data.message
        );



        btn.innerHTML=
        "Submitted ✓";



    }catch(err){

        alert(
            "Network error"
        );



        btn.disabled=false;


        btn.innerHTML=
        "Submit Proof";

    }

}


</script>

</body>
  </html>
