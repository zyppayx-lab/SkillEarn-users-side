<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SkillEarn Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family:sans-serif;
}

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.float-card{
    animation:floatCard 3s infinite;
}

@keyframes floatCard{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-3px);
    }

    100%{
        transform:translateY(0);
    }

}

</style>

</head>


<body class="bg-slate-100">


<div id="app"></div>


<div
    id="loader"

    class="
        fixed
        inset-0
        bg-black/10
        z-50
        flex
        items-center
        justify-center
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>




<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    )

);



if(!token){

    window.location =
    "login.html";

}



load();




function currency(){

    if(
        user.country==="NG"
    ){

        return "₦";

    }


    return "$";

}




function auth(){

    return {

        Authorization:
        "Bearer "+
        token

    };

}




async function fetchJobs(
    endpoint
){

    try{

        const res =
        await fetch(

            API+
            endpoint,

            {

                headers:
                auth()

            }

        );


        if(
            !res.ok
        ){

            return [];

        }


        return await res.json();


    }catch{

        return [];

    }

}




async function load(){

    try{


        const tasks =
        await fetchJobs(
            "/api/users/tasks"
        );


        const freelance =
        await fetchJobs(
            "/api/users/freelance-jobs"
        );


        const hiring =
        await fetchJobs(
            "/api/users/hiring-jobs"
        );


        const influencer =
        await fetchJobs(
            "/api/users/influencer-jobs"
        );



        const jobs = [

            ...tasks.map(
                x=>({
                    ...x,
                    type:"TASK"
                })
            ),

            ...freelance.map(
                x=>({
                    ...x,
                    type:"FREELANCE"
                })
            ),

            ...hiring.map(
                x=>({
                    ...x,
                    type:"HIRING"
                })
            ),

            ...influencer.map(
                x=>({
                    ...x,
                    type:"INFLUENCER"
                })
            )

        ];



        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render(
            jobs
        );



    }catch{


        window.location =
        "login.html";

    }

}




function render(
    jobs
){

    document
    .getElementById(
        "app"
    )
    .innerHTML = `

        <div class="
            pb-28
            p-4
        ">


            <div class="
                mb-5
            ">

                <p class="
                    text-slate-500
                ">
                    Browse Jobs 💼
                </p>


                <h2 class="
                    text-2xl
                    font-bold
                ">
                    ${user.name}
                </h2>

            </div>



            ${

                jobs.length

                ?

                jobs.map(
                    card
                ).join("")

                :

                empty()

            }


        </div>




        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            shadow-2xl
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav(
                "🏠",
                "dashboard.html"
            )}

            ${nav(
                "💼",
                "jobs.html"
            )}

            ${nav(
                "🔔",
                "notifications.html"
            )}

            ${nav(
                "👤",
                "profile.html"
            )}

        </div>

    `;

}




function card(
    job
){

    return `

        <div class="
            bg-white
            rounded-[28px]
            p-5
            shadow
            mb-4
        ">


            <div class="
                flex
                justify-between
                mb-3
            ">


                <h3 class="
                    font-bold
                    text-lg
                ">
                    ${job.title || "Untitled"}
                </h3>


                <span class="
                    text-xs
                    bg-blue-100
                    text-blue-700
                    px-3
                    py-1
                    rounded-full
                ">
                    ${job.type}
                </span>


            </div>


            <p class="
                text-slate-600
                mb-4
            ">
                ${job.description || ""}
            </p>


            <div class="
                text-blue-600
                font-bold
            ">

                ${currency()}
                ${Number(
                    job.reward || 0
                ).toLocaleString()}

            </div>


        </div>

    ";

}




function empty(){

    return `

        <div class="
            bg-white
            rounded-[28px]
            p-6
            text-center
            shadow
        ">

            No jobs available

        </div>

    ";

}




function nav(
    icon,
    page
){

    return `

        <a

            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    ";

}

</script>


</body>
</html>
