<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.fade{
    animation:fade .35s;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>


<div
    id="loader"

    class="
        fixed
        inset-0
        flex
        items-center
        justify-center
        bg-black/10
        z-50
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    ) || "{}"

);



if(!token){

    location =
    "login.html";

}



load();




function currency(){

    if(
        user.country==="NG"
    ){

        return "₦";

    }


    return "$";

}




async function load(){

    try{


        const tasksRes =
        await fetch(

            API+
            "/api/users/tasks",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const freelanceRes =
        await fetch(

            API+
            "/api/users/freelance-jobs",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const hiringRes =
        await fetch(

            API+
            "/api/users/hiring-jobs",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const influencerRes =
        await fetch(

            API+
            "/api/users/influencer-jobs",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const tasks =
        await tasksRes.json();


        const freelance =
        await freelanceRes.json();


        const hiring =
        await hiringRes.json();


        const influencer =
        await influencerRes.json();



        const jobs = [

            ...tasks.map(
                x=>({
                    ...x,
                    type:"TASK"
                })
            ),

            ...freelance.map(
                x=>({
                    ...x,
                    type:"FREELANCE"
                })
            ),

            ...hiring.map(
                x=>({
                    ...x,
                    type:"HIRING"
                })
            ),

            ...influencer.map(
                x=>({
                    ...x,
                    type:"INFLUENCER"
                })
            )

        ];



        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render(
            jobs
        );



    }catch(error){

        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render(
            []
        );

    }

}




function render(
    jobs
){

    let content =
    "";



    if(
        !jobs.length
    ){

        content = `

            <div class="
                text-center
                mt-20
            ">

                <div class="
                    text-6xl
                    mb-4
                ">
                    💼
                </div>


                <h3 class="
                    text-xl
                    font-bold
                    mb-2
                ">
                    No jobs available
                </h3>

            </div>

        `;

    }

    else{

        content =

        jobs.map(

            x=>card(
                x
            )

        ).join("");

    }



    document
    .getElementById(
        "app"
    )
    .innerHTML = `

        <div class="
            p-4
            pb-28
        ">

            <h1 class="
                text-2xl
                font-bold
                mb-5
            ">
                Available Jobs
            </h1>


            ${content}

        </div>




        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav("🏠","dashboard.html")}
            ${nav("💰","jobs.html")}
            ${nav("🔔","notifications.html")}
            ${nav("👤","profile.html")}

        </div>

    `;

}




function card(
    job
){

    return `

        <div class="
            fade
            bg-white
            rounded-[28px]
            p-5
            shadow
            mb-4
        ">


            <div class="
                flex
                justify-between
                mb-3
            ">

                <b>
                    ${job.title || "Untitled"}
                </b>


                <span>

                    ${job.type}

                </span>

            </div>


            <p class="
                text-slate-500
                mb-3
            ">

                ${job.description || ""}

            </p>


            <b class="
                text-blue-600
            ">

                ${currency()}
                ${Number(
                    job.reward || 0
                ).toLocaleString()}

            </b>

        </div>

    ";

}




function nav(
    icon,
    page
){

    return `

        <a

            href="${page}"

            class="
                nav-btn
                text-2xl
            "
        >
