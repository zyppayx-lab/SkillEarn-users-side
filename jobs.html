<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jobs • SkillEarn</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-item{
    transition:.25s;
}

.nav-item.active{
    transform:scale(1.15);
}

.nav-icon{
    transition:.25s;
}

.nav-item.active .nav-icon{
    animation:bounce .4s;
}

@keyframes bounce{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.3);
    }

    100%{
        transform:scale(1);
    }

}

</style>

</head>

<body class="bg-slate-100 pb-24">

<div id="app"></div>


<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const app =
document.getElementById(
    "app"
);



if(!token){

    window.location=
    "login.html";

}




load();




function loader(){

    app.innerHTML=`

        <div class="
            min-h-screen
            flex
            items-center
            justify-center
        ">

            <div class="
                w-12
                h-12
                border-4
                border-blue-600
                border-t-transparent
                rounded-full
                animate-spin
            "></div>

        </div>

    `;

}




async function load(){

    loader();



    const res =
    await fetch(
        API+
        "/api/users/tasks",
        {

            headers:{
                Authorization:
                "Bearer "+token
            }

        }
    );



    const jobs =
    await res.json();



    render(
        jobs
    );

}




function render(
    jobs
){

    let html = "";



    jobs.forEach(
        job=>{

            html += `

                <div class="
                    bg-white
                    rounded-3xl
                    p-5
                    shadow
                    mb-4
                ">

                    <h2 class="
                        font-bold
                        text-lg
                        mb-2
                    ">
                        ${job.title}
                    </h2>



                    <p class="
                        text-slate-600
                        mb-4
                    ">
                        ${job.description}
                    </p>



                    <p class="
                        text-blue-600
                        font-bold
                        mb-4
                    ">
                        Reward:
                        ${job.reward}
                    </p>




                    <input
                        id="
                            proof_${job.id}
                        "

                        placeholder="
                            Submit proof
                        "

                        class="
                            w-full
                            border
                            p-3
                            rounded-xl
                            mb-4
                        "
                    >




                    <button

                        onclick="
                            submitJob(
                                ${job.id}
                            )
                        "

                        class="
                            bg-blue-600
                            text-white
                            px-6
                            py-3
                            rounded-xl
                            font-bold
                        "
                    >

                        Submit

                    </button>

                </div>

            `;

        }
    );



    app.innerHTML=`

        <div class="
            p-4
        ">

            ${html}

        </div>


        ${bottomNav()}

    `;

}




async function submitJob(
    id
){

    const proof =
    document
    .getElementById(
        "proof_"+id
    )
    .value;




    await fetch(
        API+
        "/api/users/submit-task",
        {

            method:"POST",


            headers:{

                Authorization:
                "Bearer "+token,


                "Content-Type":
                "application/json"

            },


            body:
            JSON.stringify({

                task_id:id,

                proof:proof

            })

        }
    );



    alert(
        "Submitted"
    );

}




function bottomNav(){

return `

<div class="
    fixed
    bottom-0
    left-0
    right-0
    bg-white
    border-t
">

    <div class="
        grid
        grid-cols-4
        text-center
    ">

        <button
            onclick="
                location='dashboard.html'
            "
            class="
                nav-item
                p-3
            "
        >
            <div class="
                nav-icon
                text-2xl
            ">
                🏠
            </div>
        </button>



        <button
            class="
                nav-item
                active
                p-3
            "
        >
            <div class="
                nav-icon
                text-2xl
            ">
                💰
            </div>
        </button>



        <button
            onclick="
                location='notifications.html'
            "
            class="
                nav-item
                p-3
            "
        >
            <div class="
                nav-icon
                text-2xl
            ">
                🔔
            </div>
        </button>



        <button
            onclick="
                location='profile.html'
            "
            class="
                nav-item
                p-3
            "
        >
            <div class="
                nav-icon
                text-2xl
            ">
                👤
            </div>
        </button>

    </div>

</div>

`;

}

</script>

</body>
</html>
