<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkillEarn Jobs</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div id="app"></div>

<div
    id="loader"
    class="fixed inset-0 flex items-center justify-center bg-black/10 z-50"
>
    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>
</div>


<script>

"use strict";


const app =
document.getElementById(
    "app"
);


const loader =
document.getElementById(
    "loader"
);


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    ) || "{}"

);


if(!token){

    location =
    "login.html";

}



function auth(){

    return {

        Authorization:
        "Bearer " +
        token

    };

}



async function fetchList(
    endpoint
){

    try{

        const res =
        await fetch(

            API + endpoint,

            {

                headers:
                auth()

            }

        );


        if(
            !res.ok
        ){

            return [];

        }


        return await res.json();

    }catch(error){

        console.log(
            endpoint,
            error
        );

        return [];

    }

}



async function load(){

    try{

        const [

            tasks,

            freelance,

            hiring,

            influencer

        ] = await Promise.all([

            fetchList(
                "/api/users/tasks"
            ),

            fetchList(
                "/api/users/freelance-jobs"
            ),

            fetchList(
                "/api/users/hiring-jobs"
            ),

            fetchList(
                "/api/users/influencer-jobs"
            )

        ]);


        const jobs = [

            ...tasks.map(
                x=>({
                    ...x,
                    type:"TASK"
                })
            ),

            ...freelance.map(
                x=>({
                    ...x,
                    type:"FREELANCE"
                })
            ),

            ...hiring.map(
                x=>({
                    ...x,
                    type:"HIRING"
                })
            ),

            ...influencer.map(
                x=>({
                    ...x,
                    type:"INFLUENCER"
                })
            )

        ];


        render(
            jobs
        );


    }finally{

        loader.style.display =
        "none";

    }

}



function render(
    jobs
){

    app.innerHTML = `

        <div class="
            p-4
            pb-28
        ">

            <h1 class="
                text-2xl
                font-bold
                mb-5
            ">
                Available Jobs
            </h1>

            ${

                jobs.length

                ?

                jobs.map(

                    job => `

                        <div class="
                            bg-white
                            rounded-[28px]
                            p-5
                            shadow
                            mb-4
                        ">

                            <h3 class="
                                font-bold
                                text-lg
                            ">
                                ${job.title || "Untitled"}
                            </h3>

                            <p class="
                                text-slate-500
                            ">
                                ${job.type}
                            </p>

                        </div>

                    `

                ).join("")

                :

                `

                    <div class="
                        bg-white
                        p-5
                        rounded-[28px]
                    ">
                        No jobs available
                    </div>

                `

            }

        </div>

    ";

}



load();

</script>

</body>
</html>
