<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SkillEarn Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family:sans-serif;
}

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

</style>

</head>


<body class="bg-slate-100">


<div id="app" class="min-h-screen pb-20">


    <!-- TOP -->
    <header class="
        bg-blue-600
        text-white
        px-4
        py-4
        shadow-md
        sticky
        top-0
        z-50
    ">

        <div class="
            max-w-6xl
            mx-auto
            flex
            justify-between
            items-center
        ">

            <h1 class="
                text-xl
                font-bold
            ">
                SkillEarn
            </h1>


            <button
                onclick="logout()"
                class="text-sm"
            >
                Logout
            </button>

        </div>

    </header>



    <!-- CONTENT -->
    <main
        id="screen"

        class="
            max-w-6xl
            mx-auto
            p-4
        "
    ></main>



    <!-- BOTTOM NAV -->
    <nav class="
        fixed
        bottom-0
        left-0
        right-0
        bg-white
        border-t
        grid
        grid-cols-4
        p-3
        text-center
    ">

        <button
            onclick="
                location='dashboard.html'
            "

            class="
                nav-btn
                text-2xl
            "
        >
            🏠
        </button>


        <button
            class="
                nav-btn
                text-2xl
            "
        >
            💼
        </button>


        <button
            onclick="
                location='notifications.html'
            "

            class="
                nav-btn
                text-2xl
            "
        >
            🔔
        </button>


        <button
            onclick="
                location='profile.html'
            "

            class="
                nav-btn
                text-2xl
            "
        >
            👤
        </button>

    </nav>


</div>




<script>

"use strict";


const SCREEN =
document.getElementById(
    "screen"
);


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    ) || "{}"

);



if(!token){

    location =
    "login.html";

}




loadTasks();




function currency(){

    return user.country==="NG"

    ?

    "₦"

    :

    "$";

}




function auth(){

    return {

        Authorization:
        "Bearer " +
        token

    };

}




async function fetchJobs(
    endpoint
){

    try{

        const res =
        await fetch(

            API + endpoint,

            {

                headers:
                auth()

            }

        );


        if(
            !res.ok
        ){

            return [];

        }


        const data =
        await res.json();


        return Array.isArray(
            data
        )

        ?

        data

        :

        [];


    }catch{

        return [];

    }

}




async function loadTasks(){

    SCREEN.innerHTML = `

        <div class="
            text-center
            p-10
        ">
            Loading...
        </div>

    `;


    const [

        tasks,

        freelance,

        hiring,

        influencer

    ] = await Promise.all([

        fetchJobs(
            "/api/users/tasks"
        ),

        fetchJobs(
            "/api/users/freelance-jobs"
        ),

        fetchJobs(
            "/api/users/hiring-jobs"
        ),

        fetchJobs(
            "/api/users/influencer-jobs"
        )

    ]);


    const jobs = [

        ...tasks.map(
            x=>({
                ...x,
                type:"TASK"
            })
        ),

        ...freelance.map(
            x=>({
                ...x,
                type:"FREELANCE"
            })
        ),

        ...hiring.map(
            x=>({
                ...x,
                type:"HIRING"
            })
        ),

        ...influencer.map(
            x=>({
                ...x,
                type:"INFLUENCER"
            })
        )

    ];


    render(
        jobs
    );

}




function render(
    jobs
){

    SCREEN.innerHTML = `

        <div class="
            mb-5
        ">

            <p class="
                text-slate-500
            ">
                Browse Jobs 💼
            </p>


            <h2 class="
                text-2xl
                font-bold
            ">
                ${user.name || "User"}
            </h2>

        </div>


        ${

            jobs.length

            ?

            jobs.map(
                card
            ).join("")

            :

            empty()

        }

    `;

}




function card(
    job
){

    return `

        <div

            class="
                bg-white
                rounded-[28px]
                p-5
                shadow
                mb-4
            "
        >


            <div class="
                flex
                justify-between
                mb-3
            ">


                <h3 class="
                    font-bold
                    text-lg
                ">

                    ${job.title || "Untitled"}

                </h3>


                <span class="
                    text-xs
                    bg-blue-100
                    text-blue-700
                    px-3
                    py-1
                    rounded-full
                ">

                    ${job.type}

                </span>


            </div>


            <p class="
                text-slate-600
                mb-4
            ">

                ${job.description || ""}

            </p>


            <div class="
                text-blue-600
                font-bold
            ">

                ${currency()}
                ${Number(
                    job.reward || 0
                ).toLocaleString()}

            </div>


        </div>

    ";

}




function empty(){

    return `

        <div class="
            bg-white
            rounded-[28px]
            p-6
            text-center
            shadow
        ">

            No jobs available

        </div>

    ";

}




function logout(){

    localStorage.clear();

    location =
    "login.html";

}

</script>


</body>
    </html>
