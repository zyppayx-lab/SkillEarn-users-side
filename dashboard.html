<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SkillEarn Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-item{
    transition:.25s;
}

.nav-item.active{
    transform:scale(1.15);
}

.nav-icon{
    transition:.25s;
}

.nav-item.active .nav-icon{
    animation:bounce .4s;
}

@keyframes bounce{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.35);
    }

    100%{
        transform:scale(1);
    }

}

</style>

</head>

<body class="bg-slate-100 pb-24">

<div id="app"></div>


<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const app =
document.getElementById(
    "app"
);



if(!token){

    window.location=
    "login.html";

}




load();




function loader(){

    app.innerHTML=`

        <div class="
            min-h-screen
            flex
            justify-center
            items-center
        ">

            <div class="
                w-12
                h-12
                border-4
                border-blue-600
                border-t-transparent
                rounded-full
                animate-spin
            "></div>

        </div>

    `;

}




async function load(){

    loader();



    try{

        const res =
        await fetch(
            API+
            "/api/users/dashboard",
            {

                headers:{
                    Authorization:
                    "Bearer "+token
                }

            }
        );



        const data =
        await res.json();



        render(
            data
        );



    }catch(error){

        console.error(
            error
        );



        alert(
            "Failed to load dashboard"
        );

    }

}




function render(
    data
){

    app.innerHTML=`

        <div class="
            p-4
            max-w-6xl
            mx-auto
        ">



            <!-- WALLET -->
            <div class="
                bg-blue-600
                text-white
                rounded-3xl
                p-8
                text-center
                mb-5
            ">

                <p>
                    Wallet Balance
                </p>



                <h2 class="
                    text-4xl
                    font-bold
                    mt-2
                ">

                    ${data.profile.balance}

                </h2>

            </div>




            <!-- SHORTCUTS -->
            <div class="
                grid
                grid-cols-2
                gap-4
                mb-5
            ">

                <button
                    id="withdrawBtn"

                    class="
                        bg-white
                        rounded-3xl
                        p-5
                        shadow
                        font-bold
                    "
                >

                    Withdraw

                </button>




                <button
                    id="jobsBtn"

                    class="
                        bg-white
                        rounded-3xl
                        p-5
                        shadow
                        font-bold
                    "
                >

                    Jobs

                </button>




                <button
                    id="referBtn"

                    class="
                        bg-white
                        rounded-3xl
                        p-5
                        shadow
                        font-bold
                    "
                >

                    Refer

                </button>




                <button
                    id="historyBtn"

                    class="
                        bg-white
                        rounded-3xl
                        p-5
                        shadow
                        font-bold
                    "
                >

                    History

                </button>

            </div>




            <!-- JOB COUNT -->
            <div class="
                bg-white
                rounded-3xl
                p-6
                shadow
                mb-8
            ">

                <p class="
                    text-slate-500
                ">
                    Available Jobs
                </p>



                <h2 class="
                    text-3xl
                    font-bold
                    text-blue-600
                    mt-2
                ">

                    ${data.available_tasks}

                </h2>

            </div>



        </div>




        <!-- BOTTOM NAV -->
        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            border-t
        ">

            <div class="
                grid
                grid-cols-4
                text-center
            ">



                <button
                    id="navHome"

                    class="
                        nav-item
                        active
                        p-3
                    "
                >

                    <div class="
                        nav-icon
                        text-2xl
                    ">
                        🏠
                    </div>

                </button>




                <button
                    id="navJobs"

                    class="
                        nav-item
                        p-3
                    "
                >

                    <div class="
                        nav-icon
                        text-2xl
                    ">
                        💰
                    </div>

                </button>




                <button
                    id="navNotifications"

                    class="
                        nav-item
                        p-3
                    "
                >

                    <div class="
                        nav-icon
                        text-2xl
                    ">
                        🔔
                    </div>

                </button>




                <button
                    id="navProfile"

                    class="
                        nav-item
                        p-3
                    "
                >

                    <div class="
                        nav-icon
                        text-2xl
                    ">
                        👤
                    </div>

                </button>

            </div>

        </div>

    `;




    bindEvents();

}




function bindEvents(){

    document
    .getElementById(
        "withdrawBtn"
    )
    .onclick =
    ()=>window.location=
    "withdraw.html";



    document
    .getElementById(
        "jobsBtn"
    )
    .onclick =
    ()=>window.location=
    "jobs.html";



    document
    .getElementById(
        "referBtn"
    )
    .onclick =
    ()=>window.location=
    "referrals.html";



    document
    .getElementById(
        "historyBtn"
    )
    .onclick =
    ()=>window.location=
    "transactions.html";



    document
    .getElementById(
        "navJobs"
    )
    .onclick =
    ()=>window.location=
    "jobs.html";



    document
    .getElementById(
        "navNotifications"
    )
    .onclick =
    ()=>window.location=
    "notifications.html";



    document
    .getElementById(
        "navProfile"
    )
    .onclick =
    ()=>window.location=
    "profile.html";

}

</script>

</body>
</html>
