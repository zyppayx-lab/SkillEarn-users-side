<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SkillEarn Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family:sans-serif;
}

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

.float-card{
    animation:floatCard 3s infinite;
}

@keyframes floatCard{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-3px);
    }

    100%{
        transform:translateY(0);
    }

}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>

<div
    id="loader"

    class="
        fixed
        inset-0
        bg-black/10
        z-50
        flex
        items-center
        justify-center
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<script>

"use strict";


const API =
"https://skillearn.onrender.com";


const token =
localStorage.getItem(
    "token"
);


const user =
JSON.parse(

    localStorage.getItem(
        "user"
    )

);


if(!token){

    window.location =
    "login.html";

}



load();




function currency(){

    if(
        user.country ===
        "NG"
    ){

        return "₦";

    }


    return "$";

}






async function load(){

    try{

        const res =
        await fetch(

            API+
            "/api/users/dashboard",

            {

                headers:{
                    Authorization:
                    "Bearer "+
                    token
                }

            }

        );



        const data =
        await res.json();



        document
        .getElementById(
            "loader"
        )
        .style.display =
        "none";



        render(
            data
        );



    }catch(error){

        window.location =
        "login.html";

    }

}






function render(
    data
){

    document
    .getElementById(
        "app"
    )
    .innerHTML = `

        <div class="
            pb-28
            p-4
        ">




            <!-- TOP -->
            <div class="
                mb-5
            ">

                <p class="
                    text-slate-500
                ">
                    Welcome back 👋
                </p>


                <h2 class="
                    text-2xl
                    font-bold
                ">
                    ${user.name}
                </h2>

            </div>




            <!-- WALLET -->
            <div class="
                float-card
                bg-blue-600
                text-white
                rounded-[28px]
                p-8
                text-center
                shadow-xl
                mb-5
            ">

                <p>
                    Wallet Balance
                </p>


                <h1 class="
                    text-4xl
                    font-bold
                    mt-2
                ">

                    ${currency()}
                    ${Number(
                        data.profile.balance
                    ).toLocaleString()}

                </h1>

            </div>




            <!-- ACTIONS -->
            <div class="
                grid
                grid-cols-4
                gap-3
                mb-6
            ">

                ${action(
                    "💰",
                    "Withdraw",
                    "withdraw.html"
                )}

                ${action(
                    "🎁",
                    "Refer",
                    "referrals.html"
                )}

                ${action(
                    "💼",
                    "Jobs",
                    "jobs.html"
                )}

                ${action(
                    "👤",
                    "Profile",
                    "profile.html"
                )}

            </div>




            <!-- STATS -->
            <div class="
                bg-white
                rounded-[28px]
                p-5
                shadow
                mb-5
            ">

                <div class="
                    flex
                    justify-between
                ">

                    <span>
                        Available Jobs
                    </span>


                    <b class="
                        text-blue-600
                    ">
                        ${data.available_tasks}
                    </b>

                </div>

            </div>




            <!-- ACTIVITY -->
            <div class="
                bg-white
                rounded-[28px]
                p-5
                shadow
            ">

                <h3 class="
                    font-bold
                    mb-4
                ">
                    Recent Activity
                </h3>



                ${activity(
                    "💼",
                    "Jobs updated"
                )}


                ${activity(
                    "🎁",
                    "Referral rewards"
                )}


                ${activity(
                    "💰",
                    "Withdrawal history"
                )}

            </div>




        </div>




        <!-- BOTTOM NAV -->
        <div class="
            fixed
            bottom-0
            left-0
            right-0
            bg-white
            shadow-2xl
            border-t
            grid
            grid-cols-4
            p-3
            text-center
        ">

            ${nav(
                "🏠",
                "dashboard.html"
            )}

            ${nav(
                "💰",
                "jobs.html"
            )}

            ${nav(
                "🔔",
                "notifications.html"
            )}

            ${nav(
                "👤",
                "profile.html"
            )}

        </div>

    `;

}






function action(
    icon,
    name,
    page
){

    return `

        <a

            href="
                ${page}
            "

            class="
                bg-white
                rounded-3xl
                shadow
                p-4
                text-center
            "
        >

            <div class="
                text-2xl
                mb-1
            ">
                ${icon}
            </div>


            <div class="
                text-sm
                font-semibold
            ">
                ${name}
            </div>

        </a>

    `;

}






function activity(
    icon,
    text
){

    return `

        <div class="
            flex
            gap-3
            mb-3
        ">

            <span>
                ${icon}
            </span>


            <span>
                ${text}
            </span>

        </div>

    `;

}






function nav(
    icon,
    page
){

    return `

        <a

            href="
                ${page}
            "

            class="
                nav-btn
                text-2xl
            "
        >

            ${icon}

        </a>

    `;

}

</script>

</body>
    </html>
