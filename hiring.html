<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Hiring Jobs</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.nav-btn{
    transition:.25s;
}

.nav-btn:active{
    transform:scale(.85);
}

</style>

</head>


<body class="bg-slate-100">

<div id="app"></div>


<div
    id="loader"

    class="
        fixed
        inset-0
        flex
        items-center
        justify-center
        bg-black/10
        z-50
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
    "></div>

</div>



<script>

"use strict";


const app =
document.getElementById(
    "app"
);


const loader =
document.getElementById(
    "loader"
);


const token =
localStorage.getItem(
    "token"
);


if(!token){

    location =
    "login.html";

}



fetch(

    "https://skillearn.onrender.com/api/users/hiring-jobs",

    {

        headers:{

            Authorization:
            "Bearer " +
            token

        }

    }

)

.then(

    async res=>{

        const list =
        await res.json();



        loader.remove();



        let jobs =
        "";



        if(

            !Array.isArray(
                list
            )

            ||

            list.length===0

        ){

            jobs = `

                <div class="
                    bg-white
                    rounded-[28px]
                    p-6
                    text-center
                    shadow
                ">

                    No hiring jobs available

                </div>

            `;

        }

        else{

            for(

                let job of list

            ){

                jobs += `

                    <div class="
                        bg-white
                        rounded-[28px]
                        p-5
                        shadow
                        mb-4
                    ">


                        <h3 class="
                            font-bold
                            text-lg
                            mb-2
                        ">

                            ${job.title||"Job"}

                        </h3>



                        <p class="
                            text-slate-500
                            mb-3
                        ">

                            ${job.description||""}

                        </p>

                    </div>

                `;

            }

        }



        app.innerHTML = `

            <div class="
                p-4
                pb-28
            ">


                <h1 class="
                    text-2xl
                    font-bold
                    mb-5
                ">

                    Hiring Jobs

                </h1>



                <div class="
                    grid
                    grid-cols-4
                    gap-2
                    mb-5
                ">


                    <a

                        href="jobs.html"

                        class="
                            bg-white
                            shadow
                            rounded-xl
                            p-3
                            text-center
                            text-sm
                        "
                    >

                        Tasks

                    </a>



                    <a

                        href="freelance.html"

                        class="
                            bg-white
                            shadow
                            rounded-xl
                            p-3
                            text-center
                            text-sm
                        "
                    >

                        Freelance

                    </a>



                    <a

                        href="hiring.html"

                        class="
                            bg-blue-600
                            text-white
                            rounded-xl
                            p-3
                            text-center
                            text-sm
                        "
                    >

                        Hiring

                    </a>



                    <a

                        href="influencer.html"

                        class="
                            bg-white
                            shadow
                            rounded-xl
                            p-3
                            text-center
                            text-sm
                        "
                    >

                        Influencer

                    </a>

                </div>



                ${jobs}

            </div>




            <div class="
                fixed
                bottom-0
                left-0
                right-0
                bg-white
                border-t
                grid
                grid-cols-4
                p-3
                text-center
            ">


                <a

                    href="dashboard.html"

                    class="
                        nav-btn
                        text-2xl
                    "
                >

                    🏠

                </a>



                <a

                    href="jobs.html"

                    class="
                        nav-btn
                        text-2xl
                    "
                >

                    💼

                </a>



                <a

                    href="notifications.html"

                    class="
                        nav-btn
                        text-2xl
                    "
                >

                    🔔

                </a>



                <a

                    href="profile.html"

                    class="
                        nav-btn
                        text-2xl
                    "
                >

                    👤

                </a>

            </div>

        `;

    }

)

.catch(

    ()=>{

        loader.remove();



        app.innerHTML = `

            <div class="
                p-5
            ">

                Could not load hiring jobs

            </div>

        `;

    }

);

</script>

</body>
</html>
