<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hiring Debug</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 p-4">

<div id="status" class="text-lg font-bold mb-4">
Loading...
</div>

<pre
    id="result"
    class="bg-white p-4 rounded-2xl text-sm overflow-auto"
></pre>

<script>

const API =
"https://skillearn.onrender.com";

const token =
localStorage.getItem("token");

async function test(){

    try{

        const res =
        await fetch(

            API+
            "/api/users/hiring-jobs",

            {

                headers:{
                    Authorization:
                    "Bearer "+token
                }

            }

        );

        document
        .getElementById("status")
        .innerText =
        "Status: "+res.status;

        const text =
        await res.text();

        document
        .getElementById("result")
        .innerText =
        text;

    }catch(error){

        document
        .getElementById("status")
        .innerText =
        "ERROR";

        document
        .getElementById("result")
        .innerText =
        error.message;

    }

}

test();

</script>

</body>
</html>
