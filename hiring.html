<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hiring</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div id="app"></div>

<div
    id="loader"
    class="fixed inset-0 flex items-center justify-center bg-black/10"
>
    <div class="text-xl">
        Loading...
    </div>
</div>


<script>

"use strict";


const app =
document.getElementById(
    "app"
);


const loader =
document.getElementById(
    "loader"
);


const token =
localStorage.getItem(
    "token"
);


fetch(

    "https://skillearn.onrender.com/api/users/hiring-jobs",

    {

        headers:{

            Authorization:
            "Bearer " +
            token

        }

    }

)

.then(

    async res=>{

        const text =
        await res.text();


        loader.remove();


        app.innerHTML = `

            <div class="
                p-6
            ">

                <h1 class="
                    text-2xl
                    font-bold
                    mb-4
                ">
                    Hiring Test ✅
                </h1>


                <pre class="
                    bg-white
                    p-4
                    rounded-xl
                    overflow-auto
                ">

${text}

                </pre>

            </div>

        `;

    }

)

.catch(

    err=>{

        loader.remove();


        app.innerHTML = `

            <div class="
                p-6
                text-red-600
            ">

                ERROR:

                ${err.message}

            </div>

        `;

    }

);

</script>

</body>
</html>
