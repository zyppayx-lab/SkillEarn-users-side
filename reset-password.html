<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Reset Password</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family:sans-serif;
}

.btn:active{
    transform:scale(.97);
}

.toast{
    animation:slideUp .35s;
}

@keyframes slideUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>

</head>


<body class="bg-slate-100">




<div id="app"></div>




<div
    id="loader"

    class="
        hidden
        fixed
        inset-0
        bg-black/10
        z-50
        flex
        items-center
        justify-center
    "
>

    <div class="
        w-16
        h-16
        rounded-full
        border-[5px]
        border-blue-100
        border-t-blue-600
        animate-spin
        bg-white
        shadow-xl
    "></div>

</div>




<div
    id="toast"

    class="
        hidden
        fixed
        bottom-6
        left-4
        right-4
        z-50
    "
></div>




<script>

"use strict";



const API =
"https://skillearn.onrender.com";



const email =
localStorage.getItem(
    "reset_email"
);



const app =
document.getElementById(
    "app"
);




render();




function render(){

    app.innerHTML=`

        <div class="
            min-h-screen
            flex
            items-center
            justify-center
            p-4
        ">


            <div class="
                w-full
                max-w-md
            ">




                <div class="
                    text-center
                    mb-8
                ">

                    <div class="
                        w-20
                        h-20
                        rounded-full
                        bg-blue-600
                        mx-auto
                        mb-4
                        flex
                        items-center
                        justify-center
                        text-white
                        text-3xl
                        font-bold
                    ">
                        S
                    </div>



                    <h1 class="
                        text-3xl
                        font-bold
                    ">
                        New Password
                    </h1>



                    <p class="
                        text-slate-500
                        mt-2
                    ">
                        Secure your account
                    </p>

                </div>




                <div class="
                    bg-white
                    rounded-[28px]
                    shadow-lg
                    p-6
                ">




                    <input

                        id="otp"

                        maxlength="6"

                        placeholder="
                            OTP code
                        "

                        class="
                            w-full
                            bg-slate-50
                            border
                            p-4
                            rounded-2xl
                            mb-4
                        "
                    >




                    <div class="
                        relative
                        mb-4
                    ">


                        <input

                            id="password"

                            type="password"

                            placeholder="
                                New password
                            "

                            class="
                                w-full
                                bg-slate-50
                                border
                                p-4
                                rounded-2xl
                            "
                        >




                        <button

                            id="toggle1"

                            type="button"

                            class="
                                absolute
                                right-4
                                top-4
                            "
                        >

                            👁

                        </button>

                    </div>




                    <div class="
                        relative
                        mb-5
                    ">


                        <input

                            id="confirm"

                            type="password"

                            placeholder="
                                Confirm password
                            "

                            class="
                                w-full
                                bg-slate-50
                                border
                                p-4
                                rounded-2xl
                            "
                        >




                        <button

                            id="toggle2"

                            type="button"

                            class="
                                absolute
                                right-4
                                top-4
                            "
                        >

                            👁

                        </button>

                    </div>




                    <button

                        id="resetBtn"

                        class="
                            btn
                            w-full
                            bg-blue-600
                            text-white
                            py-4
                            rounded-2xl
                            font-bold
                        "
                    >

                        Update Password

                    </button>




                </div>

            </div>

        </div>

    `;




    document
    .getElementById(
        "toggle1"
    )
    .addEventListener(
        "click",
        ()=>toggle(
            "password"
        )
    );



    document
    .getElementById(
        "toggle2"
    )
    .addEventListener(
        "click",
        ()=>toggle(
            "confirm"
        )
    );



    document
    .getElementById(
        "resetBtn"
    )
    .addEventListener(
        "click",
        resetPassword
    );

}






function toggle(
    id
){

    const input =
    document
    .getElementById(
        id
    );



    input.type =
    input.type ===
    "password"

    ?

    "text"

    :

    "password";

}






async function resetPassword(){

    const password =
    document
    .getElementById(
        "password"
    )
    .value;



    const confirm =
    document
    .getElementById(
        "confirm"
    )
    .value;



    if(
        password !==
        confirm
    ){

        showToast(
            "Passwords do not match"
        );

        return;

    }



    showLoader();




    try{

        const res =
        await fetch(

            API+
            "/api/auth/reset-password",

            {

                method:"POST",


                headers:{
                    "Content-Type":
                    "application/json"
                },


                body:
                JSON.stringify({

                    email,



                    otp:
                    document
                    .getElementById(
                        "otp"
                    )
                    .value,



                    new_password:
                    password

                })

            }

        );



        const data =
        await res.json();



        hideLoader();




        const messages = {

            "Password updated":
            "Password changed successfully",

            "Invalid OTP":
            "Invalid reset code"

        };



        showToast(

            messages[
                data.message
            ] ||

            "Completed"

        );



        if(
            data.message===
            "Password updated"
        ){

            setTimeout(

                ()=>{

                    window.location =
                    "login.html";

                },

                1200

            );

        }



    }catch(error){

        hideLoader();

        showToast(
            "Connection failed"
        );

    }

}






function showLoader(){

    document
    .getElementById(
        "loader"
    )
    .classList
    .remove(
        "hidden"
    );

}




function hideLoader(){

    document
    .getElementById(
        "loader"
    )
    .classList
    .add(
        "hidden"
    );

}




function showToast(
    message
){

    const toast =
    document
    .getElementById(
        "toast"
    );



    toast.innerHTML = `

        <div class="
            toast
            bg-blue-600
            text-white
            px-5
            py-4
            rounded-2xl
            shadow-xl
            text-center
            font-semibold
        ">

            ${message}

        </div>

    `;



    toast.classList.remove(
        "hidden"
    );



    setTimeout(

        ()=>{

            toast.classList.add(
                "hidden"
            );

        },

        2500

    );

}

</script>

</body>
</html>
